function moveMonsters() {
  for (const m of game.monsters) {
    const info = MONSTER_TYPES[m.type];
    if ((game.turn - AWAKEN_TURN) % info.moveEvery !== 0) continue;
    moveMonsterToward(m, 1);
    if (game.over) return;
  }
}

function moveMonsterToward(m, steps) {
  const info = MONSTER_TYPES[m.type];
  if (m.type === 'gargoyle' && updateGargoyleState(m)) return;
  if (m.type === 'priest' && movePriest(m)) return;
  if (m.type === 'scarab' && moveScarab(m)) return;
  const seesPlayer = shouldMonsterChase(m);
  if (shouldEarlyEdgeRelief(m)) {
    moveMonsterAwayFromPlayer(m);
    log(`${info.name}在狭窄边缘退开了一步，你终于有机会脱身。`, 'important');
    return;
  }
  if (seesPlayer && shouldMonsterBlunder()) {
    randomMonsterWander(m);
    return;
  }
  if (seesPlayer && canMonsterStepTo(m, game.player.x, game.player.y)) {
    attackPlayer(m);
    return;
  }
  for (let s = 0; s < steps; s++) {
    let moves = getMonsterMoves(m);
    if (seesPlayer) {
      if (moves.length === 0) continue;
      moves.sort((a, b) => dist(a, game.player) - dist(b, game.player));
      m.x = moves[0].x;
      m.y = moves[0].y;
      afterMonsterMove(m);
    } else {
      const choice = pick([...moves, { x: m.x, y: m.y }]);
      m.x = choice.x;
      m.y = choice.y;
      afterMonsterMove(m);
    }
  }
}

function afterMonsterMove(m) {
  if (m.type === 'giant_scarab') {
    game.cursedGrounds.add(keyOf(m.x, m.y));
    if (game.turn % 3 === 0) {
      let changed = 0;
      for (let y = m.y - 2; y <= m.y + 2; y++) {
        for (let x = m.x - 2; x <= m.x + 2; x++) {
          const key = keyOf(x, y);
          if (!inBounds(x, y) || isExit(x, y) || game.pits.has(key) || (game.wells && game.wells.has(key))) continue;
          game.quicksands.add(key);
          changed++;
        }
      }
      if (changed) log('巨型圣甲虫释放虫群冲击波，周围地面塌成流沙。', 'danger');
    }
  }
}

function updateGargoyleState(m) {
  if (m.petrified && Math.max(Math.abs(m.x - game.player.x), Math.abs(m.y - game.player.y)) <= 2) {
    m.petrified = false;
    log('你身后的石像突然睁开了眼睛——它的翅膀开始展开。', 'danger');
    return true;
  }
  if (!m.petrified && Math.max(Math.abs(m.x - game.player.x), Math.abs(m.y - game.player.y)) > 3) {
    m.petrified = true;
    log('石像鬼失去目标，重新凝固为沉默的石像。');
    return true;
  }
  return m.petrified;
}

function moveScarab(m) {
  const purifyKeys = Object.keys(game.purifies || {});
  if (!purifyKeys.length) return false;
  const targets = purifyKeys.map(k => {
    const [x, y] = k.split(',').map(Number);
    return { x, y, key: k, d: dist(m, { x, y }) };
  }).sort((a, b) => a.d - b.d);
  const target = targets[0];
  if (dist(m, target) === 1 && canMonsterStepTo(m, target.x, target.y)) {
    m.x = target.x;
    m.y = target.y;
    delete game.purifies[target.key];
    log('圣甲虫啃碎了一件净化道具。', 'danger');
    return true;
  }
  const moves = getMonsterMoves(m).sort((a, b) => dist(a, target) - dist(b, target));
  if (moves.length) {
    m.x = moves[0].x;
    m.y = moves[0].y;
  }
  return true;
}

function getPriestTargets() {
  const targets = [];
  (game.cursedWells ? [...game.cursedWells] : []).forEach(k => {
    const [x, y] = k.split(',').map(Number);
    targets.push({ x, y, key: k, type: 'cursedWell' });
  });
  return targets;
}

function movePriest(m) {
  const targets = getPriestTargets();
  if (!targets.length) {
    teleportMonsterAcrossMap(m);
    return true;
  }
  const target = targets.sort((a, b) => dist(m, a) - dist(m, b))[0];
  if (dist(m, target) <= 1) {
    game.empoweredCursedWells = game.empoweredCursedWells || new Set();
    game.empoweredCursedWells.add(target.key);
    log('祭司魂魄在诅咒水井旁祈祷，污染范围扩大。', 'danger');
    return true;
  }
  const moves = getMonsterMoves(m).sort((a, b) => dist(a, target) - dist(b, target));
  if (moves.length) {
    m.x = moves[0].x;
    m.y = moves[0].y;
  }
  return true;
}

function teleportMonsterAcrossMap(m) {
  for (let i = 0; i < 80; i++) {
    const x = rng(0, game.mapSize - 1);
    const y = rng(0, game.mapSize - 1);
    if (canMonsterStandAt(m, x, y) && dist({ x, y }, m) > game.mapSize / 3) {
      m.x = x;
      m.y = y;
      return;
    }
  }
}

function getMonsterBlunderChance() {
  if (game.adventures <= 5) return 0.2;
  if (game.adventures <= 10) return 0.1;
  return 0;
}

function shouldMonsterBlunder() {
  const chance = getMonsterBlunderChance();
  return chance > 0 && Math.random() < chance;
}

function randomMonsterWander(m) {
  const moves = getMonsterMoves(m);
  if (!moves.length) return;
  const choice = pick(moves);
  m.x = choice.x;
  m.y = choice.y;
}

function isPlayerOnMapEdge() {
  return game.player.x === 0 ||
    game.player.y === 0 ||
    game.player.x === game.mapSize - 1 ||
    game.player.y === game.mapSize - 1;
}

function shouldEarlyEdgeRelief(m) {
  if (game.adventures > 5) return false;
  if (hasAnyWeapon()) return false;
  if (!isPlayerOnMapEdge()) return false;
  return dist(m, game.player) === 1;
}

function moveMonsterAwayFromPlayer(m) {
  const moves = getMonsterMoves(m);
  if (!moves.length) return;
  moves.sort((a, b) => dist(b, game.player) - dist(a, game.player));
  m.x = moves[0].x;
  m.y = moves[0].y;
}

function getMonsterMoves(m) {
  return [
    { x: m.x + 1, y: m.y },
    { x: m.x - 1, y: m.y },
    { x: m.x, y: m.y + 1 },
    { x: m.x, y: m.y - 1 },
  ].filter(p => canMonsterStepTo(m, p.x, p.y) && !(p.x === game.player.x && p.y === game.player.y));
}

function shouldMonsterChase(m) {
  const inLocalRange = Math.abs(game.player.x - m.x) <= 2 && Math.abs(game.player.y - m.y) <= 2;
  return (inLocalRange && hasClearWallPath(m, game.player)) || hasStraightLineSight(m, game.player);
}

function hasStraightLineSight(a, b) {
  if (a.x !== b.x && a.y !== b.y) return false;
  if (a.x === b.x) {
    const step = Math.sign(b.y - a.y);
    for (let y = a.y; y !== b.y; y += step) {
      if (hasWallBetween(a.x, y, 0, step)) return false;
    }
    return true;
  }
  const step = Math.sign(b.x - a.x);
  for (let x = a.x; x !== b.x; x += step) {
    if (hasWallBetween(x, a.y, step, 0)) return false;
  }
  return true;
}

function hasClearWallPath(a, b) {
  const queue = [{ x: a.x, y: a.y }];
  const seen = new Set([keyOf(a.x, a.y)]);
  const maxSteps = Math.abs(a.x - b.x) + Math.abs(a.y - b.y) + 4;
  let head = 0;
  while (head < queue.length) {
    const cur = queue[head++];
    if (cur.x === b.x && cur.y === b.y) return true;
    if (dist(cur, a) > maxSteps) continue;
    for (const dir of DIR_INFO) {
      const nx = cur.x + dir.dx;
      const ny = cur.y + dir.dy;
      const key = keyOf(nx, ny);
      if (!inBounds(nx, ny) || seen.has(key)) continue;
      if (hasWallBetween(cur.x, cur.y, dir.dx, dir.dy)) continue;
      seen.add(key);
      queue.push({ x: nx, y: ny });
    }
  }
  return false;
}

function canMonsterStandAt(m, x, y) {
  if (!inBounds(x, y)) return false;
  if (isExit(x, y)) return false;
  if (!MONSTER_TYPES[m.type].phase && game.pits.has(`${x},${y}`)) return false;
  if (game.wells && game.wells.has(`${x},${y}`)) return false;
  if (game.cursedWells && game.cursedWells.has(`${x},${y}`)) return false;
  if (game.quicksands && game.quicksands.has(`${x},${y}`)) return false;
  if (isOccupied(x, y, m)) return false;
  if (x === game.player.x && y === game.player.y) return false;
  return true;
}

function canMonsterStepTo(m, x, y) {
  if (!inBounds(x, y)) return false;
  const info = MONSTER_TYPES[m.type];
  const dx = x - m.x;
  const dy = y - m.y;
  if (Math.abs(dx) + Math.abs(dy) !== 1) return false;
  if (!info.phase && hasWallBetween(m.x, m.y, dx, dy)) return false;
  if (!info.phase && game.pits.has(`${x},${y}`)) return false;
  if (game.wells && game.wells.has(`${x},${y}`)) return false;
  if (game.cursedWells && game.cursedWells.has(`${x},${y}`)) return false;
  if (game.quicksands && game.quicksands.has(`${x},${y}`)) return false;
  if (isExit(x, y)) return false;
  if (isOccupied(x, y, m)) return false;
  return true;
}

function attackPlayer(m) {
  const info = MONSTER_TYPES[m.type];
  if (info.attack <= 0) return;
  playSfx('hit');
  const damage = m.enragedTurns > 0 ? info.attack * 2 : info.attack;
  game.attackCell = `${game.player.x},${game.player.y}`;
  game.hp -= damage;
  log(`${info.name}扑向你，造成 ${damage} 点伤害！`, 'danger');
  if (m.type === 'scorpion') {
    game.poisonTurns = 3;
    log('巨蝎毒针刺入皮肤：接下来3回合每回合额外 +2 诅咒。', 'danger');
  }
  render();
  setTimeout(() => {
    if (game.attackCell) {
      game.attackCell = null;
      render();
    }
  }, 450);
  if (game.hp <= 0) gameOver(`${info.name}击倒了你。冒险次数和金币全部清零。`);
}

function reduceCurseForKill(m) {
  if (handleSpecialMonsterDrop(m)) return;
  const reduce = m.type === 'bat' ? 10 : m.type === 'mummy' ? 20 : 0;
  if (reduce <= 0) return;
  game.curse = Math.max(0, game.curse - reduce);
  log(`击杀${MONSTER_TYPES[m.type].name}，诅咒值 -${reduce}。`, 'gold');
  playPurifyFeedback(reduce);
}

function handleSpecialMonsterDrop(m) {
  const table = {
    scarab: { goldP: 0.60, gold: [5, 15], curseP: 0.30, curse: 3, itemP: 0.10, item: 'scarab' },
    scorpion: { goldP: 0.15, gold: [10, 20], curseP: 0.75, curse: 8, itemP: 0.10, item: 'antidote' },
    priest: { goldP: 0.10, gold: [15, 30], curseP: 0.80, curse: 12, itemP: 0.10, item: 'purifyeye' },
    gargoyle: { goldP: 0.15, gold: [20, 40], curseP: 0.75, curse: 10, itemP: 0.10, item: 'diamond' },
    jackal: { goldP: 0.60, gold: [15, 30], curseP: 0.30, curse: 5, itemP: 0.10, item: 'water' },
    giant_scarab: { goldP: 1, gold: [100, 200], curseP: 1, curse: 20, itemP: 0.50, item: 'relic' },
  };
  const d = table[m.type];
  if (!d) return false;
  if (m.type === 'giant_scarab') {
    const gold = rng(d.gold[0], d.gold[1]);
    game.gold += gold;
    game.adventureGold += gold;
    showGoldGain(gold);
    game.curse = Math.max(0, game.curse - d.curse);
    log(`击杀巨型圣甲虫，获得 ${gold} 金币，诅咒值 -${d.curse}。`, 'gold');
    playPurifyFeedback(d.curse);
    if (Math.random() < d.itemP) handleMonsterItemDrop('relic', m);
    return true;
  }
  const roll = Math.random();
  if (roll < d.goldP) {
    const gold = rng(d.gold[0], d.gold[1]);
    game.gold += gold;
    game.adventureGold += gold;
    showGoldGain(gold);
    log(`击杀${MONSTER_TYPES[m.type].name}，掉落 ${gold} 金币。`, 'gold');
  } else if (roll < d.goldP + d.curseP) {
    game.curse = Math.max(0, game.curse - d.curse);
    log(`击杀${MONSTER_TYPES[m.type].name}，诅咒值 -${d.curse}。`, 'gold');
    playPurifyFeedback(d.curse);
  } else if (roll < d.goldP + d.curseP + d.itemP) {
    handleMonsterItemDrop(d.item, m);
  }
  return true;
}

function handleMonsterItemDrop(item, m) {
  if (item === 'scarab') {
    game.purifies[keyOf(m.x, m.y)] = 'scarab';
    showCenterFloat('+圣甲虫护符', 'item');
    log('圣甲虫碎壳中露出一枚圣甲虫护符。', 'gold');
  } else if (item === 'antidote') {
    game.antidotes++;
    showCenterFloat('+解毒剂', 'item');
    log('巨蝎掉落了解毒剂。', 'gold');
  } else if (item === 'purifyeye') {
    game.purifyEyeLevel = Math.min(3, (game.purifyEyeLevel || 0) + 1);
    showCenterFloat('+净化之眼', 'item');
    log('祭司魂魄留下净化之眼的微光。', 'gold');
  } else if (item === 'diamond') {
    game.treasures[keyOf(m.x, m.y)] = { value: 100, type: 'diamond', name: '钻石' };
    showCenterFloat('+钻石', 'item');
    log('石像鬼碎块中露出一枚钻石。', 'gold');
  } else if (item === 'water') {
    game.purifies[keyOf(m.x, m.y)] = 'water';
    showCenterFloat('+生命之水', 'item');
    log('豺狼看守掉落了生命之水。', 'gold');
  } else if (item === 'relic') {
    const available = RELIC_DEFS.filter(r => !hasRelic(r.id));
    if (available.length) {
      showCenterFloat('+遗物', 'item');
      collectRelic(pick(available).id);
    }
  }
}

function killMonster(m, source = '') {
  markMonsterKilled(m.type);
  game.monsters = game.monsters.filter(x => x !== m);
  log(`${MONSTER_TYPES[m.type].name}倒下了。${source}`, 'gold');
  if (m.type === 'jackal' && m.pairId) {
    const mate = game.monsters.find(x => x.type === 'jackal' && x.pairId === m.pairId);
    if (mate) {
      mate.enragedTurns = 3;
      log('另一只豺狼看守发出愤怒的嚎叫，进入狂暴状态。', 'danger');
    } else {
      game.gold += 100;
      game.adventureGold += 100;
      showGoldGain(100);
      log('成对击杀豺狼看守，额外获得 100 金币。', 'gold');
    }
  }
  if (hasRelic('sacrifice_blade') && Number.isFinite(m.maxHp)) {
    const gold = m.maxHp * 5;
    game.gold += gold;
    game.adventureGold += gold;
    showGoldGain(gold);
    log(`献祭之刃收割灵魂：额外获得 ${gold} 金币。`, 'gold');
    spreadCursedGround(m.x, m.y);
  }
  reduceCurseForKill(m);
}

function spreadCursedGround(cx, cy) {
  if (!game.cursedGrounds) game.cursedGrounds = new Set();
  for (let y = cy - 1; y <= cy + 1; y++) {
    for (let x = cx - 1; x <= cx + 1; x++) {
      if (!inBounds(x, y) || isExit(x, y) || game.pits.has(keyOf(x, y))) continue;
      game.cursedGrounds.add(keyOf(x, y));
    }
  }
  log('诅咒爆发，周围地面被暗紫色裂纹污染。', 'danger');
}

function isSleepingMonster(m) {
  return game.turn < AWAKEN_TURN && !m.startled;
}

function playerAttack(m) {
  const info = MONSTER_TYPES[m.type];
  const wasSleeping = isSleepingMonster(m);
  playSfx('dagger');
  if (m.type === 'ghost') {
    log('匕首划过幽灵的残影，没有造成伤害。', 'danger');
    if (wasSleeping) {
      m.startled = true;
      log('幽灵被惊醒了，墓室里浮现出刺骨的叹息。', 'important');
      render();
      endTurn();
      return;
    }
    game.hp -= info.attack;
    playSfx('hit');
    log(`${info.name}反击，生命 -${info.attack}。`, 'danger');
    render();
    if (game.hp <= 0) gameOver(`${info.name}的反击击倒了你。`);
    else endTurn();
    return;
  }
  const damage = getDamageAmount(1);
  m.hp -= damage;
  addCellEffect(m.x, m.y, 'hit', '✦');
  log(`你用匕首刺向${info.name}，造成 ${damage} 点伤害。`, 'danger');
  if (m.hp <= 0) {
    killMonster(m);
    render();
    endTurn();
    return;
  } else {
    log(`${info.name}剩余生命：${m.hp}。`);
  }
  if (wasSleeping) {
    m.startled = true;
    log(`${info.name}被惊醒了！它还没有反击，但下一次攻击会招来报复。`, 'important');
    render();
    endTurn();
    return;
  }
  game.hp -= info.attack;
  playSfx('hit');
  log(`${info.name}反击，生命 -${info.attack}。`, 'danger');
  render();
  if (game.hp <= 0) gameOver(`${info.name}的反击击倒了你。`);
  else endTurn();
}

function attackAdjacent() {
  if (game.over || game.shopOpen || game.modalOpen) return;
  if (!game.hasDagger) {
    log('我没有武器，无法攻击。', 'danger');
    return;
  }
  // attack the nearest adjacent monster (any direction)
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  for (const [dx, dy] of dirs) {
    const tx = game.player.x + dx;
    const ty = game.player.y + dy;
    if (!inBounds(tx, ty)) continue;
    if (hasWallBetween(game.player.x, game.player.y, dx, dy)) continue;
    const m = monsterAt(tx, ty);
    if (m) { playerAttack(m); return; }
  }
  log('四周没有可以攻击的怪物。');
}

function playPurifyFeedback(amount = 0) {
  playSfx('purify');
  const container = document.getElementById('board-container');
  const bar = document.getElementById('curse-bar');
  container.classList.remove('purify-flash');
  if (bar && bar.parentElement) bar.parentElement.classList.remove('purify-flash');
  container.querySelectorAll('.purify-reduce-float').forEach(el => el.remove());
  // force restart animation
  void container.offsetWidth;
  container.classList.add('purify-flash');
  if (bar && bar.parentElement) bar.parentElement.classList.add('purify-flash');
  if (amount > 0) queueCurseFloat(-amount);
  setTimeout(() => {
    container.classList.remove('purify-flash');
    if (bar && bar.parentElement) bar.parentElement.classList.remove('purify-flash');
  }, 950);
}

function isOccupied(x, y, self) {
  if (game.monsters.some(m => m !== self && m.x === x && m.y === y)) return true;
  return false;
}

function checkLose() {
  if (game.hp <= 0) {
    gameOver('你的生命已尽，长眠于古墓之中。');
    return;
  }
  // blocked check: if all 4 sides are blocked and we're in awaken phase
  if (game.turn >= AWAKEN_TURN) {
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    let blocked = 0;
    for (const [dx, dy] of dirs) {
      const nx = game.player.x + dx, ny = game.player.y + dy;
      if (!inBounds(nx, ny)) { blocked++; continue; }
      if (hasWallBetween(game.player.x, game.player.y, dx, dy)) blocked++;
      else if (game.pits.has(`${nx},${ny}`)) blocked++;
      else if (game.wells && game.wells.has(`${nx},${ny}`)) blocked++;
      else if (monsterAt(nx, ny)) blocked++;
    }
    if (blocked === 4) {
      if (isNearExit(game.player.x, game.player.y)) {
        log('出口就在身边，即使怪物逼近，你仍有逃生的机会。', 'important');
        return;
      }
      if (game.hasDagger) {
        log('你被围住了，但手中的匕首仍可能劈开一条生路。', 'important');
        return;
      }
      gameOver('你被怪物完全堵住，无路可逃！或许有了武器，情况会不一样？');
    }
  }
}

function showCenterFloat(text, type = 'item') {
  const container = document.getElementById('board-container');
  if (!container) return;
  const el = document.createElement('div');
  el.className = `center-float ${type}`;
  const lane = audioState.floatLane++;
  el.style.top = `calc(50% + ${lane * 30}px)`;
  el.textContent = text;
  container.appendChild(el);
  setTimeout(() => {
    if (el.parentNode) el.remove();
    audioState.floatLane = Math.max(0, audioState.floatLane - 1);
  }, 1000);
}

function scheduleFloatFlush() {
  if (audioState.floatBatch.timer) return;
  audioState.floatBatch.timer = setTimeout(flushFloatBatch, 0);
}

function queueCurseFloat(delta) {
  audioState.floatBatch.curse += delta;
  scheduleFloatFlush();
}

function queueGoldFloat(amount) {
  audioState.floatBatch.gold += amount;
  scheduleFloatFlush();
}

function flushFloatBatch() {
  const batch = audioState.floatBatch;
  batch.timer = null;
  const curse = batch.curse;
  const gold = batch.gold;
  batch.curse = 0;
  batch.gold = 0;
  if (curse < 0) showCenterFloat(`诅咒-${Math.abs(curse)}`, 'recover');
  else if (curse > 0) showCenterFloat(`诅咒+${curse}`, 'curse');
  if (gold > 0) showCenterFloat(`+${gold}金币`, 'gold');
}

function showGoldGain(amount) {
  if (amount > 0) {
    queueGoldFloat(amount);
    playSfx('coin');
  }
}

function increaseCurse(amount) {
  if (amount <= 0) return 0;
  const before = game.curse;
  game.curse = Math.min(CURSE_MAX, game.curse + amount);
  const gained = game.curse - before;
  if (gained > 0) {
    queueCurseFloat(gained);
    playSfx('curse');
  }
  return gained;
}

function isExit(x, y) {
  return game.exits && game.exits.has(keyOf(x, y));
}

function isNearExit(x, y) {
  if (!game.exits) return dist({ x, y }, game.start) <= 1;
  for (const k of game.exits) {
    const [ex, ey] = k.split(',').map(Number);
    if (Math.abs(ex - x) + Math.abs(ey - y) <= 1) return true;
  }
  return false;
}

function detonateBomb() {
  const bx = game.placedBomb.x, by = game.placedBomb.y;
  playSfx('explosion');
  log('💥 炸弹爆炸！', 'important');
  // show explosion effect on affected cells before removing monsters
  const affectedKeys = [];
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      affectedKeys.push(`${bx + dx},${by + dy}`);
    }
  }
  showExplosionEffect(affectedKeys);
  // delay monster removal until explosion animation finishes
  const killed = [];
  const ignored = [];
  let nestsDestroyed = 0;
  affectedKeys.forEach(k => {
    if (game.scarabNests && game.scarabNests[k] && !game.scarabNests[k].exhausted) {
      game.scarabNests[k].exhausted = true;
      nestsDestroyed++;
    }
  });
  game.monsters = game.monsters.filter(m => {
    if (Math.abs(m.x - bx) <= 1 && Math.abs(m.y - by) <= 1) {
      if (m.type === 'ghost' || m.type === 'giant_scarab') {
        ignored.push(MONSTER_TYPES[m.type].name);
        return true;
      }
      killed.push(MONSTER_TYPES[m.type].name);
      reduceCurseForKill(m);
      return false;
    }
    return true;
  });
  setTimeout(() => {
    killed.forEach(name => log(`  · ${name}被炸碎。`, 'gold'));
    ignored.forEach(name => log(`  · ${name}穿过爆风，毫发无伤。`, 'danger'));
    if (nestsDestroyed) log(`  · ${nestsDestroyed} 个圣甲虫巢穴被炸毁。`, 'gold');
    render();
  }, 550);
  game.placedBomb = null;
}

function showExplosionEffect(keys) {
  const board = document.getElementById('board');
  const origin = getViewOrigin();
  const cells = board.children;
  for (let sy = 0; sy < VIEW_SIZE; sy++) {
    for (let sx = 0; sx < VIEW_SIZE; sx++) {
      const x = origin.x + sx;
      const y = origin.y + sy;
      if (keys.includes(`${x},${y}`)) {
        const c = cells[sy * VIEW_SIZE + sx];
        const eff = document.createElement('div');
        eff.className = 'explosion-effect';
        eff.textContent = '💥';
        c.appendChild(eff);
        setTimeout(() => { if (eff.parentNode) eff.remove(); }, 650);
      }
    }
  }
}

function startAim(itemId) {
  if (game.aim && game.aim.itemId === itemId) {
    cancelAim('已取消瞄准。');
    return;
  }
  game.aim = { itemId, previewKeys: new Set(), impactKeys: new Set(), invalidKey: '' };
  const nameMap = { flash: '照明棒', gun: '手枪', holy: '圣光术', hook: '钩爪' };
  log(`已选中${nameMap[itemId]}。将鼠标移到目标方向预览范围，再次左键或按空格确认；再次点击道具可取消。`, 'important');
  render();
}

function cancelAim(msg = '') {
  game.aim = null;
  if (msg) log(msg);
  render();
}

function getAimDirection(x, y) {
  const dx = x - game.player.x;
  const dy = y - game.player.y;
  if (dx === 0 && dy === 0) return null;
  if (Math.abs(dx) >= Math.abs(dy)) return { dx: Math.sign(dx), dy: 0 };
  return { dx: 0, dy: Math.sign(dy) };
}

function isHookObstacle(x, y) {
  return !inBounds(x, y) || (game.wells && game.wells.has(keyOf(x, y))) || (game.cursedWells && game.cursedWells.has(keyOf(x, y)));
}

function isHookSafeLanding(x, y) {
  const key = keyOf(x, y);
  return inBounds(x, y) &&
    !game.pits.has(key) &&
    !(game.wells && game.wells.has(key)) &&
    !(game.cursedWells && game.cursedWells.has(key)) &&
    !(game.quicksands && game.quicksands.has(key)) &&
    !(game.cursedGrounds && game.cursedGrounds.has(key)) &&
    !monsterAt(x, y);
}

function buildHookPreview(dir) {
  const previewKeys = new Set();
  const impactKeys = new Set();
  let px = game.player.x;
  let py = game.player.y;
  let lastSafe = null;
  for (let i = 1; i <= currentMapSize(); i++) {
    if (hasWallBetween(px, py, dir.dx, dir.dy)) break;
    const x = game.player.x + dir.dx * i;
    const y = game.player.y + dir.dy * i;
    if (!inBounds(x, y)) break;
    previewKeys.add(keyOf(x, y));
    if (isHookObstacle(x, y)) break;
    if (isHookSafeLanding(x, y)) lastSafe = { x, y };
    px = x;
    py = y;
  }
  if (lastSafe) impactKeys.add(keyOf(lastSafe.x, lastSafe.y));
  return { previewKeys, impactKeys, landing: lastSafe };
}

function buildDirectionalPreview(itemId, dir) {
  if (itemId === 'hook') return buildHookPreview(dir);
  const maxRange = itemId === 'gun' || itemId === 'flash' ? 5 : currentMapSize();
  const previewKeys = new Set();
  const impactKeys = new Set();
  let target = null;
  const targets = [];
  let last = null;
  for (let i = 1; i <= maxRange; i++) {
    const x = game.player.x + dir.dx * i;
    const y = game.player.y + dir.dy * i;
    if (!inBounds(x, y)) break;
    last = { x, y };
    previewKeys.add(keyOf(x, y));
    const m = monsterAt(x, y);
    if (itemId === 'gun') {
      if (m && (game.gunLevel >= 2 || m.type !== 'ghost')) {
        targets.push(m);
        impactKeys.add(keyOf(m.x, m.y));
        if (game.gunLevel <= 0 || targets.length >= 2) break;
      }
      continue;
    }
    if (itemId === 'holy' && m) { target = m; break; }
  }
  if (itemId === 'holy') {
    const center = target || last;
    if (center) {
      for (let y = center.y - 1; y <= center.y + 1; y++) {
        for (let x = center.x - 1; x <= center.x + 1; x++) {
          if (inBounds(x, y)) impactKeys.add(keyOf(x, y));
        }
      }
    }
  } else if (target) {
    impactKeys.add(keyOf(target.x, target.y));
  }
  return { previewKeys, impactKeys, target: target || targets[0] || null, targets };
}

function updateAimPreview(x, y) {
  if (!game.aim || game.shopOpen || game.modalOpen || game.over) return;
  const dir = getAimDirection(x, y);
  if (!dir) {
    game.aim.previewKeys = new Set();
    game.aim.impactKeys = new Set();
    game.aim.invalidKey = keyOf(x, y);
    render();
    return;
  }
  const preview = buildDirectionalPreview(game.aim.itemId, dir);
  game.aim.dir = dir;
  game.aim.previewKeys = preview.previewKeys;
  game.aim.impactKeys = preview.impactKeys;
  game.aim.target = preview.target || null;
  game.aim.targets = preview.targets || [];
  game.aim.landing = preview.landing || null;
  game.aim.invalidKey = '';
  render();
}

function damageMonster(m, amount, type, sourceText = '') {
  if (!m) return false;
  if (m.type === 'gargoyle' && m.petrified) {
    log('石化状态的石像鬼免疫了伤害。', 'danger');
    return false;
  }
  if (m.type === 'giant_scarab' && type === 'holy') amount = 5;
  amount = getDamageAmount(amount);
  const info = MONSTER_TYPES[m.type];
  if (m.type === 'ghost' && type === 'physical') {
    log(`${info.name}没有实体，物理伤害穿透了它。`, 'danger');
    return false;
  }
  if (m.type === 'ghost' && type === 'holy') {
    killMonster(m, sourceText || '被圣光焚尽。');
    return true;
  }
  if (m.type === 'ghost' && type === 'sacred') {
    killMonster(m, sourceText || '被圣弹放逐。');
    return true;
  }
  m.hp -= amount;
  addCellEffect(m.x, m.y, 'hit', type === 'holy' ? '☀' : '✦');
  log(`${sourceText || '攻击'}对${info.name}造成 ${amount} 点伤害。`, 'danger');
  if (m.hp <= 0) {
    killMonster(m);
    return true;
  }
  log(`${info.name}剩余生命：${m.hp}。`);
  return false;
}

function confirmAim() {
  if (!game.aim) return;
  if (!game.aim.dir || !game.aim.previewKeys || game.aim.previewKeys.size === 0) {
    log('请选择一个有效方向。', 'danger');
    return;
  }
  const itemId = game.aim.itemId;
  const previewKeys = new Set(game.aim.previewKeys);
  const impactKeys = new Set(game.aim.impactKeys);
  const target = game.aim.target;
  const targets = game.aim.targets || [];
  const landing = game.aim.landing || null;
  game.aim = null;
  if (itemId === 'flash') {
    if (game.flashlights <= 0) { log('没有照明棒。'); render(); return; }
    game.flashlights--;
    previewKeys.forEach(k => {
      const [x, y] = k.split(',').map(Number);
      if (inBounds(x, y)) {
        game.revealed[y][x] = true;
        game.flashlitCells.add(k);
        addCellEffect(x, y, 'flash', '', 520);
      }
    });
    log('✦ 照明棒照亮了选定方向。', 'important');
  } else if (itemId === 'gun') {
    if (!game.hasGun) { log('你还没有手枪。', 'danger'); render(); return; }
    if (game.bullets <= 0) { log('没有子弹。', 'danger'); render(); return; }
    game.bullets--;
    playSfx('gun');
    const bulletType = game.gunLevel >= 2 ? 'sacred' : 'physical';
    if (game.gunLevel >= 1 && targets.length) {
      damageMonster(targets[0], 3, bulletType, game.gunLevel >= 2 ? '圣弹' : '子弹');
      if (targets[1]) damageMonster(targets[1], 1, bulletType, game.gunLevel >= 2 ? '圣弹余威' : '穿透余威');
    } else if (target) {
      damageMonster(target, 3, bulletType, game.gunLevel >= 2 ? '圣弹' : '子弹');
    } else {
      log('枪声在墓室中回荡，却没有命中可受伤的目标。', 'danger');
    }
  } else if (itemId === 'hook') {
    if (game.hooks <= 0) { log('没有钩爪。', 'danger'); render(); return; }
    if (!landing) { log('钩爪没有找到可落脚的位置。', 'danger'); render(); return; }
    game.hooks--;
    addCellEffect(landing.x, landing.y, 'item', '🪝', 520);
    movePlayerByHook(landing);
  } else if (itemId === 'holy') {
    if (game.holyLights <= 0) { log('没有圣光术。', 'danger'); render(); return; }
    game.holyLights--;
    playSfx('purify');
    impactKeys.forEach(k => {
      const [x, y] = k.split(',').map(Number);
      addCellEffect(x, y, 'holy', '', 760);
    });
    let hit = 0;
    [...game.monsters].forEach(m => {
      if (impactKeys.has(keyOf(m.x, m.y))) {
        hit++;
        damageMonster(m, m.type === 'giant_scarab' ? 5 : 3, 'holy', '圣光');
      }
    });
    impactKeys.forEach(k => {
      if (game.scarabNests && game.scarabNests[k] && !game.scarabNests[k].exhausted) {
        game.scarabNests[k].exhausted = true;
        log('圣光净化了圣甲虫巢穴，它不再释放虫群。', 'gold');
      }
    });
    if (hit === 0) log('金色圣光在空旷处爆发，没有命中怪物。');
  }
  render();
}

function useFlashlight() {
  if (game.flashlights <= 0) { log('没有照明棒。'); return; }
  startAim('flash');
}

function placeBomb() {
  if (game.bombs <= 0) { log('没有炸弹。'); return; }
  if (game.placedBomb) { log('已有一颗炸弹放置中。'); return; }
  game.bombs--;
  game.placedBomb = { x: game.player.x, y: game.player.y };
  addCellEffect(game.player.x, game.player.y, 'item', '💣', 600);
  log('💣 你放置了一颗炸弹，下回合爆炸。', 'important');
  render();
}

function useAntidote() {
  if (game.antidotes <= 0) { log('没有解毒剂。'); return; }
  game.antidotes--;
  game.poisonTurns = 0;
  const reduce = Math.ceil(CURSE_MAX * 0.15);
  game.curse = Math.max(0, game.curse - reduce);
  log('✦ 饮下解毒剂，诅咒值 -15%。一阵清明穿过你的脑海。', 'gold');
  playPurifyFeedback(reduce);
  render();
}

function useHourglass() {
  if (!hasRelic('soul_hourglass') || game.hourglassUsed) { log('碎魂沙漏已经失去力量。'); return; }
  game.hourglassUsed = true;
  game.curse = 0;
  game.hourglassPenalty++;
  game.hp = Math.min(game.hp, getMaxHp());
  log('你摇动碎魂沙漏，诅咒被清零，但生命上限永久损失1点。', 'danger');
  playPurifyFeedback(CURSE_MAX);
  render();
}

function useHolyLight() {
  if (game.holyLights <= 0) { log('没有圣光术。'); return; }
  game.holyLights--;
  let hit = 0;
  let purified = 0;
  const impactKeys = new Set();
  for (let y = game.player.y - 1; y <= game.player.y + 1; y++) {
    for (let x = game.player.x - 1; x <= game.player.x + 1; x++) {
      if (inBounds(x, y)) impactKeys.add(keyOf(x, y));
    }
  }
  [...game.monsters].forEach(m => {
    if (impactKeys.has(keyOf(m.x, m.y))) {
      hit++;
      damageMonster(m, m.type === 'giant_scarab' ? 5 : 3, 'holy', '圣光');
    }
  });
  impactKeys.forEach(k => {
    if (game.cursedGrounds && game.cursedGrounds.delete(k)) purified++;
    if (game.cursedWells && game.cursedWells.delete(k)) purified++;
    if (game.scarabNests && game.scarabNests[k] && !game.scarabNests[k].exhausted) {
      game.scarabNests[k].exhausted = true;
      purified++;
    }
  });
  if (hit === 0 && purified === 0) log('金色圣光以你为中心爆发，却没有命中怪物。');
  else log(`金色圣光以你为中心爆发，笼罩周围 3×3 区域${purified ? `，净化 ${purified} 处诅咒地形` : ''}。`, 'important');
  render();
}

function useGun() {
  if (!game.hasGun) { log('你还没有手枪。', 'danger'); return; }
  if (game.bullets <= 0) { log('没有子弹。', 'danger'); return; }
  startAim('gun');
}

function useHook() {
  if (game.hooks <= 0) { log('没有钩爪。'); return; }
  startAim('hook');
}

function collectTileAt(x, y) {
  const tk = keyOf(x, y);
  if (game.purifies && game.purifies[tk]) {
    const pid = game.purifies[tk];
    const pdef = PURIFY_TYPES[pid];
    if (pid === 'scarab') game.scarabTalismanGrace = true;
    const percent = hasRelic('judgement_scale') ? pdef.reduce * 2 : pdef.reduce;
    const reduceAmt = Math.ceil(CURSE_MAX * percent / 100);
    game.curse = Math.max(0, game.curse - reduceAmt);
    log(`✦ 拾得${pdef.name}：诅咒值 -${percent}%。<br><span style="color:#a08660;font-size:10px">${pdef.desc}</span>`, 'gold');
    playPurifyFeedback(reduceAmt);
    delete game.purifies[tk];
  }
  if (game.treasures[tk]) {
    const treasure = game.treasures[tk];
    const value = getGoldAmount(treasure.value);
    log(`✦ 拾取${treasure.name} +${value} 金币`, 'gold');
    game.gold += value;
    game.adventureGold += value;
    showGoldGain(value);
    delete game.treasures[tk];
  }
  if (game.relics[tk]) {
    const relicId = game.relics[tk];
    delete game.relics[tk];
    collectRelic(relicId);
  }
}

function collectRelic(relicId) {
  const relic = RELIC_MAP[relicId];
  if (!relic || hasRelic(relicId)) return;
  unlockNotebook('relics', relicId);
  game.collectedRelics.push(relicId);
  game.relicsCollected = game.collectedRelics.length;
  applyRelicEffect(relicId);
  log(`★ 拾得遗物：${relic.name}。`, relic.cursed ? 'danger' : 'gold');
  showRelicPopup(relic);
  if (game.relicsCollected >= TOTAL_RELICS && !game.pharaohGateUnlocked) {
    game.pharaohGateUnlocked = true;
    game.pendingPharaohSummon = true;
  }
}

function applyRelicEffect(relicId) {
  if (relicId === 'golden_mask') {
    const bonus = Math.round(game.gold * 0.3);
    game.gold += bonus;
    game.adventureGold += Math.round(game.adventureGold * 0.3);
    showGoldGain(bonus);
    log(`黄金面具让已获得财富增重：额外获得 ${bonus} 金币。`, 'gold');
  } else if (relicId === 'life_seed') {
    game.hp = getMaxHp();
    const reduce = Math.ceil(game.curse * 0.5);
    game.curse = Math.max(0, game.curse - reduce);
    playPurifyFeedback(reduce);
  } else if (relicId === 'pharaoh_coin') {
    const value = getGoldAmount(500);
    game.gold += value;
    game.adventureGold += value;
    showGoldGain(value);
    log(`法老的金币沉入你的钱袋：+${value} 金币。`, 'gold');
  } else if (relicId === 'sun_disk') {
    revealAround(game.player.x, game.player.y, getVisionRadius());
  } else if (relicId === 'memory_tablet') {
    applyMemoryTabletHints();
  }
}

function movePlayerByHook(p) {
  playSfx('hook');
  const oldKey = keyOf(game.player.x, game.player.y);
  game.player.x = p.x;
  game.player.y = p.y;
  revealAround(p.x, p.y, 1);
  if (game.pendingCrackCollapse && game.pendingCrackCollapse === oldKey) {
    game.crackedFloors.delete(oldKey);
    game.pits.add(oldKey);
    game.pendingCrackCollapse = '';
    playSfx('crack');
    log('身后的破碎地面崩塌成了坑。', 'danger');
  }
  const k = keyOf(p.x, p.y);
  if (game.crackedFloors && game.crackedFloors.has(k)) {
    game.pendingCrackCollapse = k;
    log('钩爪把你拉到破碎地面上，离开后它会塌陷。', 'danger');
  }
  if (game.trapdoors && game.trapdoors.has(k)) {
    triggerTrapdoor(p.x, p.y, true);
    return;
  }
  collectTileAt(p.x, p.y);
  log('钩爪收紧，你越过阻碍被拉向前方。', 'important');
  render();
  promptEscapeAtStart();
}

function triggerScarabNest(x, y) {
  const key = keyOf(x, y);
  const nest = game.scarabNests && game.scarabNests[key];
  if (!nest || nest.exhausted || nest.released >= 3 || game.turn < nest.nextTurn) return;
  if (game.monsters.filter(m => m.type === 'scarab').length >= 6) return;
  const spots = [];
  for (let yy = y - 1; yy <= y + 1; yy++) {
    for (let xx = x - 1; xx <= x + 1; xx++) {
      if (canPlaceMonster(xx, yy)) spots.push({ x: xx, y: yy });
    }
  }
  if (!spots.length) return;
  const p = pick(spots);
  game.monsters.push(createMonster('scarab', p.x, p.y));
  nest.released++;
  nest.nextTurn = game.turn + 3;
  if (nest.released >= 3) nest.exhausted = true;
  log('你踩碎了虫穴的外壳——一只圣甲虫从裂缝中涌出。', 'danger');
}

function triggerTrapdoor(x, y, safe) {
  const key = keyOf(x, y);
  if (!game.trapdoors || !game.trapdoors.has(key)) return false;
  game.trapdoors.delete(key);
  playSfx(safe ? 'hook' : 'hazard');
  const target = findTrapdoorExit(x, y);
  if (!target) return false;
  game.player.x = target.x;
  game.player.y = target.y;
  revealAround(target.x, target.y, getVisionRadius());
  if (!safe) {
    let immune = false;
    if (game.scarabTalismanGrace && Math.random() < 0.5) immune = true;
    if (!immune) game.hp--;
    log(immune ? '圣甲虫护符发出微光，你从暗道坠落却没有受伤。' : '脚下的地面突然塌陷——你掉进黑暗通道，生命 -1！', immune ? 'gold' : 'danger');
  } else {
    log('钩爪钩住陷阱门边缘，你安全触发暗道传送。', 'important');
  }
  collectTileAt(target.x, target.y);
  endTurn();
  promptEscapeAtStart();
  return true;
}

function findTrapdoorExit(x, y) {
  const preferRight = x < game.mapSize / 2;
  for (let i = 0; i < 180; i++) {
    const tx = preferRight ? rng(Math.floor(game.mapSize / 2), game.mapSize - 1) : rng(0, Math.floor(game.mapSize / 2));
    const ty = rng(0, game.mapSize - 1);
    if (isSafeTeleportCell(tx, ty)) return { x: tx, y: ty };
  }
  return null;
}

function isSafeTeleportCell(x, y) {
  const key = keyOf(x, y);
  return inBounds(x, y) && !isExit(x, y) && !game.pits.has(key) &&
    !(game.wells && game.wells.has(key)) &&
    !(game.cursedWells && game.cursedWells.has(key)) &&
    !(game.quicksands && game.quicksands.has(key)) &&
    !(game.scarabNests && game.scarabNests[key]) &&
    !(game.trapdoors && game.trapdoors.has(key)) &&
    !(game.jackalLairs && game.jackalLairs.has(key)) &&
    !(game.relics && game.relics[key]) &&
    !(game.treasures && game.treasures[key]) &&
    !(game.purifies && game.purifies[key]) &&
    !monsterAt(x, y);
}

function useScroll() {
  if (game.scrolls <= 0) { log('没有传送卷轴。'); return; }
  const validKeys = new Set();
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      if (dx === 0 && dy === 0) continue;
      const x = game.player.x + dx, y = game.player.y + dy;
      if (canTeleportTo(x, y)) validKeys.add(keyOf(x, y));
    }
  }
  if (!validKeys.size) { log('卷轴没有找到可传送的位置。', 'danger'); return; }
  game.teleportSelect = { validKeys, invalidKey: '' };
  log('传送卷轴已展开：请选择 3×3 范围内的目标地格。', 'important');
  render();
}

function confirmScrollTeleport(x, y) {
  const key = keyOf(x, y);
  if (!game.teleportSelect || !game.teleportSelect.validKeys.has(key)) {
    if (game.teleportSelect) game.teleportSelect.invalidKey = key;
    log('只能选择周围 3×3 范围内的安全地格。', 'danger');
    render();
    return;
  }
  game.teleportSelect = null;
  game.scrolls--;
  teleportTo({ x, y });
  log('✦ 传送卷轴将你送往指定地格。', 'important');
}

function useRope() {
  if (game.ropes <= 0) { log('没有绳索。'); return; }
  const exits = [...game.exits].map(k => {
    const [x, y] = k.split(',').map(Number);
    return { x, y };
  });
  exits.sort(() => Math.random() - 0.5);
  for (const e of exits) {
    const spots = [];
    for (let y = e.y - 2; y <= e.y + 2; y++) {
      for (let x = e.x - 2; x <= e.x + 2; x++) {
        if (canTeleportTo(x, y) && game.revealed[y][x]) spots.push({ x, y });
      }
    }
    if (spots.length) {
      game.ropes--;
      teleportTo(pick(spots));
      log('✦ 绳索把你拖向一个已知出口附近。', 'important');
      return;
    }
  }
  log('绳索找不到可见的出口附近落点。', 'danger');
}

function canTeleportTo(x, y) {
  const key = keyOf(x, y);
  return inBounds(x, y) &&
    !game.pits.has(key) &&
    !(game.wells && game.wells.has(key)) &&
    !(game.cursedWells && game.cursedWells.has(key)) &&
    !(game.scarabNests && game.scarabNests[key]) &&
    !(game.jackalLairs && game.jackalLairs.has(key)) &&
    !monsterAt(x, y);
}

function teleportTo(p) {
  game.player.x = p.x;
  game.player.y = p.y;
  revealAround(p.x, p.y, 1);
  addCellEffect(p.x, p.y, 'item', '✦', 650);
  collectTileAt(p.x, p.y);
  render();
  promptEscapeAtStart();
}

function getBackpackCapacity() {
  return 3 + Math.min(2, game.backpackLevel || 0) * 3;
}

function getConsumableStackIds() {
  const ids = [];
  if (game.bullets > 0) ids.push('bullet');
  if (game.flashlights > 0) ids.push('flash');
  if (game.bombs > 0) ids.push('bomb');
  if (game.antidotes > 0) ids.push('antidote');
  if (game.holyLights > 0) ids.push('holy');
  if (game.scrolls > 0) ids.push('scroll');
  if (game.ropes > 0) ids.push('rope');
  if (game.hooks > 0) ids.push('hook');
  return ids;
}

function canCarryConsumable(id) {
  const ids = getConsumableStackIds();
  return ids.includes(id) || ids.length < getBackpackCapacity();
}

function getCarryBlockReason(g) {
  if (g.id === 'gun' && game.bullets <= 0 && !canCarryConsumable('bullet')) return `背包已满：无法接收赠送子弹`;
  if (g.kind !== 'consumable') return '';
  if (canCarryConsumable(g.id)) return '';
  return `背包已满：${getConsumableStackIds().length} / ${getBackpackCapacity()}`;
}

function openShop(forceRefresh = false, bypassExit = false) {
  if (!bypassExit && !isExit(game.player.x, game.player.y)) {
    log('只有在出口才能交易。');
    return;
  }
  game.shopOpen = true;
  if (forceRefresh || !game.currentShopGoods) game.currentShopGoods = getShopGoods();
  const goods = game.currentShopGoods.map(renderShopItem).join('');
  const pharaohButton = game.pharaohGateUnlocked && !game.pharaohConquered
    ? '<button class="btn" onclick="startPharaohBattle()">直面法老</button>'
    : '';
  showModal(`
    <h2>⚱ 远 古 商 店 ⚱</h2>
    <p>第 ${game.adventures} 次冒险整备中</p>
    <p>你的金币: <span style="color:#ffd966;font-weight:bold">${game.gold}</span></p>
    <p>背包：<span style="color:#ffd966;font-weight:bold">${getConsumableStackIds().length} / ${getBackpackCapacity()}</span></p>
    <div id="shop-items" class="${game.hasMerchantGuild ? 'merchant-shop' : ''}">
      ${goods}
    </div>
    ${pharaohButton}
    <button class="btn" onclick="closeShop()">离开商店</button>
  `);
}

function getShopGoods() {
  const all = getAllShopGoods();
  const available = all.filter(g => {
    if (g.id === 'dagger' && game.hasDagger) return false;
    if (g.id === 'gun' && (game.hasGun || !game.hasDagger)) return false;
    if (g.id === 'bullet' && !game.hasGun) return false;
    if (g.id === 'backpack1' && game.backpackLevel !== 0) return false;
    if (g.id === 'backpack2' && (game.backpackLevel !== 1 || game.adventures < 5)) return false;
    if (g.id === 'gunup1' && (!game.hasGun || game.gunLevel !== 0)) return false;
    if (g.id === 'gunup2' && (!game.hasGun || game.gunLevel !== 1 || game.adventures < 5)) return false;
    if (g.id === 'curseeye1' && game.curseEyeLevel !== 0) return false;
    if (g.id === 'curseeye2' && game.curseEyeLevel !== 1) return false;
    if (g.id === 'curseeye3' && (game.curseEyeLevel !== 2 || game.adventures < 5)) return false;
    if (g.id === 'merchant' && game.hasMerchantGuild) return false;
    if (g.id === 'pharaohSeal' && (!game.pharaohConquered || game.hasPharaohSeal)) return false;
    if (g.id === 'purifyeye1' && game.purifyEyeLevel !== 0) return false;
    if (g.id === 'purifyeye2' && game.purifyEyeLevel !== 1) return false;
    if (g.id === 'purifyeye3' && (game.purifyEyeLevel !== 2 || game.adventures < 5)) return false;
    return true;
  });
  const limit = game.hasMerchantGuild ? 6 : 3;
  if (!game.hasDagger) {
    const dagger = available.find(g => g.id === 'dagger');
    const others = available.filter(g => g.id !== 'dagger').sort(() => Math.random() - 0.5).slice(0, limit - 1);
    return dagger ? [dagger, ...others] : others;
  }
  return available.sort(() => Math.random() - 0.5).slice(0, limit);
}

function renderShopItem(g) {
  const soldOut = !!g.soldOut;
  const fresh = getAllShopGoods().find(item => item.id === g.id);
  if (fresh && !soldOut) g = fresh;
  if (fresh && soldOut) g = { ...fresh, soldOut: true, owned: '已拥有' };
  const carryReason = getCarryBlockReason(g);
  const price = getShopPrice(g.price);
  const disabled = soldOut || game.gold < price || !!carryReason;
  const reason = carryReason ? `<div class="desc" style="color:#d44">${carryReason}</div>` : '';
  const original = price < g.price ? ` <span style="text-decoration:line-through;color:#806040">${g.price}</span>` : '';
  const priceLine = soldOut ? `已售罄 (${g.owned})` : `价格: ${price}${original} 金币 (${g.owned})`;
  const buttonText = soldOut ? '已售罄' : '购买';
  return `<div class="shop-item">
    <div class="name">${g.name}</div>
    <div class="desc">${g.desc}</div>
    <div class="price">${priceLine}</div>
    ${reason}
    <button class="btn" onclick="buy('${g.id}')" ${disabled ? 'disabled' : ''}>${buttonText}</button>
  </div>`;
}

function refreshCurrentShopGoods() {
  if (!game.currentShopGoods) return;
  const freshMap = new Map(getAllShopGoods().map(g => [g.id, g]));
  game.currentShopGoods = game.currentShopGoods
    .map(g => g.soldOut ? g : (freshMap.get(g.id) || g))
    .filter(g => {
      if (g.soldOut) return true;
      if (g.id === 'dagger' && game.hasDagger) return false;
      if (g.id === 'gun' && (game.hasGun || !game.hasDagger)) return false;
      if (g.id === 'merchant' && game.hasMerchantGuild) return false;
      if (g.id === 'pharaohSeal' && game.hasPharaohSeal) return false;
      if (g.id === 'backpack1' && game.backpackLevel !== 0) return false;
      if (g.id === 'backpack2' && game.backpackLevel !== 1) return false;
      if (g.id === 'gunup1' && game.gunLevel !== 0) return false;
      if (g.id === 'gunup2' && game.gunLevel !== 1) return false;
      if (g.id === 'curseeye1' && game.curseEyeLevel !== 0) return false;
      if (g.id === 'curseeye2' && game.curseEyeLevel !== 1) return false;
      if (g.id === 'curseeye3' && game.curseEyeLevel !== 2) return false;
      if (g.id === 'purifyeye1' && game.purifyEyeLevel !== 0) return false;
      if (g.id === 'purifyeye2' && game.purifyEyeLevel !== 1) return false;
      if (g.id === 'purifyeye3' && game.purifyEyeLevel !== 2) return false;
      return true;
    });
}

function expandMerchantShopSlots() {
  if (!game.currentShopGoods || !game.hasMerchantGuild) return;
  const existing = new Set(game.currentShopGoods.map(g => g.id));
  const candidates = getShopGoods().filter(g => !existing.has(g.id));
  for (const g of candidates) {
    if (game.currentShopGoods.length >= 6) break;
    game.currentShopGoods.push(g);
    existing.add(g.id);
  }
}

function showShopPurchaseFloat(text = '购买成功') {
  const old = document.querySelector('.shop-float');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'shop-float';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 950);
}

function getShopPrice(cost) {
  return hasRelic('obsidian_tablet') ? Math.ceil(cost * 0.8) : cost;
}

window.buy = function(t) {
  let bought = false;
  if (['bullet', 'flash', 'bomb', 'antidote', 'holy', 'scroll', 'rope', 'hook'].includes(t) && !canCarryConsumable(t)) {
    log(`背包已满，无法购买新的消耗品类型。当前 ${getConsumableStackIds().length} / ${getBackpackCapacity()}。`, 'danger');
    openShop();
    render();
    return;
  }
  if (t === 'gun' && game.bullets <= 0 && !canCarryConsumable('bullet')) {
    log('背包已满，无法接收手枪赠送的子弹。', 'danger');
    openShop();
    render();
    return;
  }
  if (t === 'dagger' && !game.hasDagger && spendGold(DAGGER_PRICE)) { game.hasDagger = true; bought = true; }
  else if (t === 'gun' && !game.hasGun && spendGold(GUN_PRICE)) { game.hasGun = true; game.bullets += 3; bought = true; log('你买下手枪，并获得3发子弹。', 'important'); }
  else if (t === 'backpack1' && game.backpackLevel === 0 && spendGold(BACKPACK_UPGRADE_PRICES[0])) { game.backpackLevel = 1; bought = true; log('背包扩容完成：消耗品携带上限提升到6格。', 'gold'); }
  else if (t === 'backpack2' && game.backpackLevel === 1 && game.adventures >= 5 && spendGold(BACKPACK_UPGRADE_PRICES[1])) { game.backpackLevel = 2; bought = true; log('背包扩容完成：消耗品携带上限提升到9格。', 'gold'); }
  else if (t === 'gunup1' && game.hasGun && game.gunLevel === 0 && spendGold(GUN_UPGRADE_PRICES[0])) { game.gunLevel = 1; bought = true; log('手枪升级完成：子弹获得穿透效果。', 'gold'); }
  else if (t === 'gunup2' && game.hasGun && game.gunLevel === 1 && game.adventures >= 5 && spendGold(GUN_UPGRADE_PRICES[1])) { game.gunLevel = 2; bought = true; log('圣弹改造完成：子弹现在可以伤害幽灵。', 'gold'); }
  else if (t === 'curseeye1' && game.curseEyeLevel === 0 && spendGold(CURSE_EYE_PRICES[0])) { game.curseEyeLevel = 1; updateCurseEyeMarks(); bought = true; log('你挖出诅咒之眼，迷雾中的3个怪物位置浮现红光。', 'danger'); }
  else if (t === 'curseeye2' && game.curseEyeLevel === 1 && spendGold(CURSE_EYE_PRICES[1])) { game.curseEyeLevel = 2; updateCurseEyeMarks(); bought = true; log('诅咒之眼变得更清晰，5个怪物位置浮现红光。', 'danger'); }
  else if (t === 'curseeye3' && game.curseEyeLevel === 2 && game.adventures >= 5 && spendGold(CURSE_EYE_PRICES[2])) { game.curseEyeLevel = 3; updateCurseEyeMarks(); bought = true; log('诅咒之眼完全睁开，所有迷雾怪物都无所遁形。', 'danger'); }
  else if (t === 'merchant' && !game.hasMerchantGuild && spendGold(MERCHANT_GUILD_PRICE)) { game.hasMerchantGuild = true; bought = true; log('你加入了古墓商会。此后商店每次会展示6件商品。', 'gold'); }
  else if (t === 'pharaohSeal' && game.pharaohConquered && !game.hasPharaohSeal && spendGold(PHARAOH_SEAL_PRICE)) { game.hasPharaohSeal = true; bought = true; log('法老之印已归你所有：此后每次探险初始获得一个圣光术。', 'gold'); }
  else if (t === 'purifyeye1' && game.purifyEyeLevel === 0 && spendGold(PURIFY_EYE_PRICES[0])) { game.purifyEyeLevel = 1; updatePurifyEyeMarks(); bought = true; log('净化之眼凝视黑暗，3个净化道具位置浮现绿光。', 'gold'); }
  else if (t === 'purifyeye2' && game.purifyEyeLevel === 1 && spendGold(PURIFY_EYE_PRICES[1])) { game.purifyEyeLevel = 2; updatePurifyEyeMarks(); bought = true; log('净化之眼更加明亮，5个净化道具位置浮现绿光。', 'gold'); }
  else if (t === 'purifyeye3' && game.purifyEyeLevel === 2 && game.adventures >= 5 && spendGold(PURIFY_EYE_PRICES[2])) { game.purifyEyeLevel = 3; updatePurifyEyeMarks(); bought = true; log('净化之眼完全睁开，所有迷雾净化道具都透出绿光。', 'gold'); }
  else if (t === 'bullet' && game.hasGun && spendGold(BULLET_PRICE)) { game.bullets++; bought = true; }
  else if (t === 'flash' && spendGold(FLASH_PRICE)) { game.flashlights++; bought = true; }
  else if (t === 'bomb' && spendGold(BOMB_PRICE)) { game.bombs++; bought = true; }
  else if (t === 'antidote' && spendGold(ANTIDOTE_PRICE)) { game.antidotes++; bought = true; }
  else if (t === 'holy' && spendGold(HOLY_LIGHT_PRICE)) { game.holyLights++; game.everHadHolyLight = true; bought = true; }
  else if (t === 'scroll' && spendGold(SCROLL_PRICE)) { game.scrolls++; bought = true; }
  else if (t === 'rope' && spendGold(ROPE_PRICE)) { game.ropes++; bought = true; }
  else if (t === 'hook' && spendGold(HOOK_PRICE)) { game.hooks++; bought = true; }
  else { openShop(); render(); return; }
  if (bought && game.currentShopGoods) {
    const purchased = game.currentShopGoods.find(g => g.id === t);
    if (purchased && purchased.kind !== 'consumable') {
      purchased.soldOut = true;
      purchased.owned = '已拥有';
    }
    game.currentShopGoods = game.currentShopGoods.filter(g => {
      if (g.soldOut) return true;
      if (g.id === 'gunup2' && game.gunLevel !== 1) return false;
      if (g.id === 'backpack2' && game.backpackLevel !== 1) return false;
      if (g.id === 'curseeye2' && game.curseEyeLevel !== 1) return false;
      if (g.id === 'curseeye3' && game.curseEyeLevel !== 2) return false;
      if (g.id === 'purifyeye2' && game.purifyEyeLevel !== 1) return false;
      if (g.id === 'purifyeye3' && game.purifyEyeLevel !== 2) return false;
      return true;
    });
  }
  if (bought) refreshCurrentShopGoods();
  if (bought && t === 'merchant') expandMerchantShopSlots();
  openShop(false, true);
  if (bought) showShopPurchaseFloat('购买成功');
  render();
};

function spendGold(cost) {
  cost = getShopPrice(cost);
  if (game.gold < cost) return false;
  game.gold -= cost;
  game.adventureGold = Math.max(0, game.adventureGold - cost);
  if (hasRelic('obsidian_tablet')) {
    increaseCurse(5);
    log('黑曜石板吞噬交易代价：诅咒值 +5。', 'danger');
  }
  return true;
}

window.closeShop = function() {
  game.shopOpen = false;
  game.currentShopGoods = null;
  closeModal();
  log('你离开了商店。');
};

function victory(early) {
  const earned = game.adventureGold;
  const relics = game.relicsCollected;

  newGame(false);
  log(`成功撤离！上次冒险带回 ${earned} 金币，遗物 ${relics} / ${TOTAL_RELICS}。`, 'gold');

}

function getLeaderboard() {
  try {
    const data = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || '[]');
    return Array.isArray(data) ? data.filter(r => r && typeof r.score === 'number') : [];
  } catch (e) {
    return [];
  }
}

function saveLeaderboard(records) {
  const sorted = records
    .filter(r => r && typeof r.score === 'number')
    .sort((a, b) => b.score - a.score || b.createdAt - a.createdAt)
    .slice(0, 10);
  localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(sorted));
  return sorted;
}

function qualifiesForLeaderboard(score) {
  if (score <= 0) return false;
  const board = getLeaderboard().sort((a, b) => b.score - a.score);
  return board.length < 10 || score > board[9].score;
}

function makeTimestamp(date = new Date()) {
  const pad = n => String(n).padStart(2, '0');
  return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
}

function formatTime(ms) {
  const d = new Date(ms);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[ch]));
}

function renderDeathReason(reason) {
  const lines = String(reason)
    .replace(/……/g, '……\n')
    .replace(/([。！？!？])(?=\S)/g, '$1\n')
    .split('\n')
    .map(line => line.trim())
    .filter(Boolean);
  return `<div style="text-align:center;line-height:1.9;margin:10px 0;color:#d8c3a0">${lines.map(escapeHtml).join('<br>')}</div>`;
}

function renderLeaderboard(currentId = '') {
  const board = getLeaderboard().sort((a, b) => b.score - a.score || b.createdAt - a.createdAt).slice(0, 10);
  const rows = board.length ? board.map((r, i) => {
    const rank = i + 1;
    const icon = rank === 1 ? '👑 ' : rank <= 3 ? '🏆 ' : '';
    const sizeStyle = rank >= 4 ? ` style="font-size:${Math.max(13, 18 - rank * 0.5)}px"` : '';
    return `<div class="leader-row rank-${rank}${r.id === currentId ? ' is-current' : ''}" data-record-id="${escapeHtml(r.id)}"${sizeStyle}>
      <div class="leader-rank">#${rank}</div>
      <div class="leader-name">${icon}${escapeHtml(r.name)}${r.title ? ` <span style="color:#ffd966">[${escapeHtml(r.title)}]</span>` : ''}</div>
      <div class="leader-score"><span class="score-num">${r.score}</span><span class="score-unit">金币</span></div>
      <div class="leader-time">第 ${r.adventures} 次冒险 · 遗物 ${r.relics} / ${TOTAL_RELICS} · ${formatTime(r.createdAt)}</div>
    </div>`;
  }).join('') : '<div class="leader-empty">石碑尚无姓名。第一位留下金币的人，将成为古墓记住的亡者。</div>';
  return `<div class="leaderboard">
    <div class="leaderboard-title">亡者之碑</div>
    <div class="leaderboard-subtitle">凡在此留名者，皆为古墓所铭记。</div>
    <div class="leaderboard-scroll">${rows}</div>
  </div>`;
}

function focusCurrentLeaderboardRecord() {
  setTimeout(() => {
    const scroller = document.querySelector('.leaderboard-scroll');
    const current = document.querySelector('.leader-row.is-current');
    if (!scroller || !current) return;
    scroller.scrollTop = Math.max(0, current.offsetTop - scroller.offsetTop - 12);
  }, 40);
}

function resetProgressAfterDeath() {
  game.gold = 0;
  game.adventures = 1;
  game.hasDagger = false;
  game.flashlights = 0;
  game.bombs = 0;
  game.scrolls = 0;
  game.ropes = 0;
  game.hooks = 0;
  game.antidotes = 0;
  game.holyLights = 0;
  game.everHadHolyLight = false;
  game.hasGun = false;
  game.bullets = 0;
  game.backpackLevel = 0;
  game.gunLevel = 0;
  game.curseEyeLevel = 0;
  game.purifyEyeLevel = 0;
  game.hasMerchantGuild = false;
  game.collectedRelics = [];
  game.relicsCollected = 0;
  game.hourglassUsed = false;
  game.hourglassPenalty = 0;
  game.pharaohGateUnlocked = game.pharaohGateUnlocked || false;
  game.relicWindowIndex = 0;
  game.relicWindowMaps = 0;
  game.curseEyeMarks = new Set();
  game.purifyEyeMarks = new Set();
  game.adventureGold = 0;
  game.currentShopGoods = null;
  game.aim = null;
  game.modalOpen = false;
}

function showGameOverSummary(summary, currentId = '') {
  const relicLine = summary.relics > 0 ? `<p>遗物拾取：${summary.relics} / ${TOTAL_RELICS}</p>` : '';
  const rankLine = currentId ? '<p style="color:#58d9ff">你的名字已被刻入亡者之碑。</p>' : '';
  showModal(`
    <h2 style="color:#d44">☠ 探 险 失 败 ☠</h2>
    ${renderDeathReason(summary.reason)}
    <p>本次探险金币：<span style="color:#ffd966;font-weight:bold">${summary.score}</span></p>
    ${relicLine}
    ${rankLine}
    ${renderLeaderboard(currentId)}
    <p style="font-size:20px;white-space:nowrap;color:#f4d27a;font-weight:bold">已失去所有冒险进度和财富。</p>
    <button class="btn" onclick="closeModal();newGame(true)">重新开始</button>
  `);
  if (currentId) focusCurrentLeaderboardRecord();
}

function showLeaderboardEntry(summary) {
  game.pendingLeaderboardSummary = summary;
  showModal(`
    <h2 style="color:#f4d27a">碑 文 将 成</h2>
    ${renderDeathReason(summary.reason)}
    <p>你本次带着 <span style="color:#ffd966;font-weight:bold">${summary.score}</span> 金币倒在古墓深处，已超过亡者之碑的门槛。</p>
    <input class="leader-input" id="leader-name-input" maxlength="18" placeholder="输入你的名字">
    <p style="font-size:12px;color:#a08660">若不输入名字，将默认使用“寻宝猎人 + 当前时间戳”。</p>
    <div class="btn-row">
      <button class="btn" onclick="submitLeaderboardName()">铭刻姓名</button>
      <button class="btn" onclick="submitLeaderboardName(true)">匿名铭刻</button>
    </div>
    ${renderLeaderboard()}
  `);
  setTimeout(() => {
    const input = document.getElementById('leader-name-input');
    if (!input) return;
    input.focus();
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitLeaderboardName();
    });
  }, 30);
}

window.submitLeaderboardName = function(forceDefault = false) {
  const summary = game.pendingLeaderboardSummary;
  if (!summary) return;
  const input = document.getElementById('leader-name-input');
  const now = Date.now();
  const rawName = !forceDefault && input ? input.value.trim() : '';
  const name = rawName || `寻宝猎人${makeTimestamp(new Date(now))}`;
  const record = {
    id: `death-${now}-${Math.floor(Math.random() * 100000)}`,
    name,
    score: summary.score,
    relics: summary.relics,
    adventures: summary.adventures,
    title: game.pharaohConquered ? '法老征服者' : '',
    createdAt: now
  };
  saveLeaderboard([...getLeaderboard(), record]);
  game.pendingLeaderboardSummary = null;
  showGameOverSummary(summary, record.id);
};

window.showLeaderboardOnly = function() {
  game.modalOpen = true;
  showModal(`
    ${renderLeaderboard()}
    <button class="btn" onclick="closeModal()">离开石碑</button>
  `);
};

window.showNotebook = function(tab = 'monsters') {
  game.modalOpen = true;
  const tabs = `
    <div class="note-tabs">
      <button class="btn" onclick="showNotebook('monsters')">怪物</button>
      <button class="btn" onclick="showNotebook('terrains')">地形</button>
      <button class="btn" onclick="showNotebook('relics')">遗物</button>
    </div>`;
  showModal(`
    <h2>探险笔记</h2>
    <div class="desc" style="margin-bottom:8px">笔记为全局解锁，死亡不会重置。</div>
    ${tabs}
    <div class="note-section">${renderNotebookTab(tab)}</div>
    <button class="btn" onclick="closeModal()">合上笔记</button>
  `);
};

function renderNotebookTab(tab) {
  const data = getNotebook();
  if (tab === 'terrains') {
    return NOTEBOOK_TERRAINS.map(t => data.terrains.includes(t.id)
      ? `<div class="note-card"><div class="note-head">${renderNotebookIcon(getTerrainNotebookSprite(t.id), getTerrainNotebookFallback(t.id))}<div class="name">${t.name}</div></div><div>${t.desc}</div></div>`
      : `<div class="note-card locked"><div class="name">？？？</div><div>尚未发现</div></div>`).join('');
  }
  if (tab === 'relics') {
    return RELIC_DEFS.map(r => data.relics.includes(r.id) || hasRelic(r.id)
      ? `<div class="note-card"><div class="note-head">${renderNotebookIcon('', r.icon)}<div class="name">${r.name}</div></div><div>${r.desc}</div></div>`
      : `<div class="note-card locked"><div class="name">？？？</div><div>尚未发现</div></div>`).join('');
  }
  return NOTEBOOK_MONSTERS.map(m => {
    if (!data.monsters.includes(m.id)) return `<div class="note-card locked"><div class="name">？？？</div><div>尚未发现</div></div>`;
    const killed = data.monsterKills.includes(m.id);
    return `<div class="note-card"><div class="note-head">${renderNotebookIcon(getMonsterSprite(m.id))}<div class="name">${m.name}</div></div><div>${m.desc}</div><div style="margin-top:6px;color:${killed ? '#b6ffca' : '#f4d27a'}">${killed ? `击杀方法：${m.kill}` : `线索：${m.hint}`}</div></div>`;
  }).join('');
}

function renderNotebookIcon(src, fallback = '') {
  if (src) return `<div class="note-icon" style="background-image:url('${src}')"></div>`;
  return `<div class="note-icon">${escapeHtml(fallback)}</div>`;
}

function getTerrainNotebookSprite(id) {
  const map = {
    exit: 'terrain_exit.png',
    pit: 'terrain_pit.png',
    well: 'terrain_well.png',
    cracked: 'terrain_cracked.png',
    quicksand: 'terrain_quicksand.png',
    cursed_ground: 'terrain_cursed_ground.png',
    cursed_well: 'terrain_cursed_well.png',
    scarab_nest: 'terrain_scarab_nest.png',
    trapdoor: 'terrain_trapdoor.png',
    jackal_lair: 'terrain_jackal_lair.png',
  };
  return map[id] ? `assets/sprites/${map[id]}` : '';
}

function getTerrainNotebookFallback(id) {
  return id === 'wall' ? '▣' : '';
}

function gameOver(reason) {
  if (game.over) return;
  game.over = true;
  game.gameOverPending = true;
  const summary = {
    reason,
    score: game.adventureGold,
    relics: game.relicsCollected,
    adventures: game.adventures
  };
  render();
  game.gameOverTimer = setTimeout(() => {
    game.gameOverTimer = null;
    game.gameOverPending = false;
    stopBgm();
    const shouldRecord = qualifiesForLeaderboard(summary.score);
    resetProgressAfterDeath();
    if (shouldRecord) showLeaderboardEntry(summary);
    else showGameOverSummary(summary);
  }, 2000);
}

function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}
window.closeModal = function() {
  document.getElementById('modal-overlay').classList.remove('active');
  game.shopOpen = false;
  game.modalOpen = false;
};

document.addEventListener('keydown', (e) => {
  ensureAudioStarted();
  if (e.target && ['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
  if (game.over) {
    if (e.key.toLowerCase() === 'r') newGame(true);
    return;
  }
  if (game.shopOpen || game.modalOpen) return;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); if (!game.aim && !game.teleportSelect) tryMove(0, -1); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); if (!game.aim && !game.teleportSelect) tryMove(0, 1); break;
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); if (!game.aim && !game.teleportSelect) tryMove(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); if (!game.aim && !game.teleportSelect) tryMove(1, 0); break;
    case '1': case '2': case '3': case '4': case '5': case '6': case '7': case '8': case '9':
      selectItemSlot(parseInt(e.key, 10) - 1);
      break;
    case ' ': case 'Spacebar':
      e.preventDefault();
      if (game.aim) { confirmAim(); break; }
      useSelectedItem();
      break;
    case 'r': case 'R': if (confirm('重新开始？')) newGame(false); break;
  }
});

document.getElementById('restart-btn').addEventListener('click', () => {
  ensureAudioStarted();
  if (confirm('重新开始？')) newGame(false);
});
document.getElementById('notebook-btn').addEventListener('click', () => {
  ensureAudioStarted();
  showNotebook('monsters');
});
document.getElementById('leaderboard-btn').addEventListener('click', () => {
  ensureAudioStarted();
  showLeaderboardOnly();
});
document.getElementById('sound-btn').addEventListener('click', () => {
  audioState.enabled = !audioState.enabled;
  document.getElementById('sound-btn').textContent = audioState.enabled ? '声音：开' : '声音：关';
  if (audioState.enabled) {
    audioState.started = true;
    updateBgmState(true);
  } else {
    stopBgm();
  }
});

// === Item Grid System ===
const ITEM_DEFS = [
  { id: 'dagger', name: '匕首', icon: '🗡️', type: 'permanent', use: () => attackAdjacent() },
  { id: 'gun', name: '手枪', icon: '🔫', type: 'directional', use: () => useGun() },
  { id: 'flash', name: '照明棒', icon: '🔦', type: 'directional', use: () => useFlashlight() },
  { id: 'bomb', name: '炸弹', icon: '💣', type: 'consumable', use: () => placeBomb() },
  { id: 'antidote', name: '解毒剂', icon: '🧪', type: 'consumable', use: () => useAntidote() },
  { id: 'holy', name: '圣光术', icon: '☀', type: 'consumable', use: () => useHolyLight() },
  { id: 'scroll', name: '传送卷轴', icon: '📜', type: 'consumable', use: () => useScroll() },
  { id: 'rope', name: '绳索', icon: '🪢', type: 'consumable', use: () => useRope() },
  { id: 'hook', name: '钩爪', icon: '🪝', type: 'directional', use: () => useHook() },
  { id: 'hourglass', name: '碎魂沙漏', icon: '⌛', type: 'relic', use: () => useHourglass() },
];

function getPlayerItems() {
  const items = [];
  if (game.hasDagger) items.push(ITEM_DEFS[0]);
  if (game.hasGun) items.push({ ...ITEM_DEFS[1], name: game.gunLevel >= 2 ? '手枪·圣弹' : '手枪', count: game.bullets });
  if (game.flashlights > 0) items.push({ ...ITEM_DEFS[2], count: game.flashlights });
  if (game.bombs > 0) items.push({ ...ITEM_DEFS[3], count: game.bombs });
  if (game.antidotes > 0) items.push({ ...ITEM_DEFS[4], count: game.antidotes });
  if (game.holyLights > 0) items.push({ ...ITEM_DEFS[5], count: game.holyLights });
  if (game.scrolls > 0) items.push({ ...ITEM_DEFS[6], count: game.scrolls });
  if (game.ropes > 0) items.push({ ...ITEM_DEFS[7], count: game.ropes });
  if (game.hooks > 0) items.push({ ...ITEM_DEFS[8], count: game.hooks });
  if (hasRelic('soul_hourglass') && !game.hourglassUsed) items.push(ITEM_DEFS[9]);
  return items;
}

function getItemSprite(id) {
  const map = {
    dagger: 'item_dagger.png',
    gun: 'item_gun.png',
    flash: 'item_flash.png',
    bomb: 'item_bomb.png',
    antidote: 'item_antidote.png',
    holy: 'item_holy.png',
    scroll: 'item_scroll.png',
    rope: 'item_rope.png',
    hook: 'item_hook.png',
    hourglass: 'item_hourglass.png',
  };
  return map[id] ? `assets/sprites/${map[id]}` : '';
}

function renderItemGrid() {
  const grid = document.getElementById('item-grid');
  if (!grid) return;
  grid.innerHTML = '';
  const items = getPlayerItems();
  const bagStatus = document.getElementById('bag-status');
  if (bagStatus) bagStatus.textContent = `背包 ${getConsumableStackIds().length} / ${getBackpackCapacity()}`;
  for (let i = 0; i < 9; i++) {
    const slot = document.createElement('div');
    slot.className = 'item-slot';
    if (i === game.selectedSlot) slot.classList.add('selected');
    const item = items[i];
    if (item) {
      slot.innerHTML = `
        <span class="slot-num">${i + 1}</span>
        <span class="slot-icon" style="background-image:url('${getItemSprite(item.id)}')">${item.icon}</span>
        <span class="slot-name">${item.name}</span>
        ${item.count !== undefined ? `<span class="slot-count">×${item.count}</span>` : ''}
      `;
      slot.addEventListener('click', () => {
        selectItemSlot(i);
        useSelectedItem();
      });
    } else {
      slot.classList.add('empty');
      slot.innerHTML = `<span class="slot-num">${i + 1}</span>`;
    }
    grid.appendChild(slot);
  }
  renderPermanentList();
}

function renderPermanentList() {
  const el = document.getElementById('permanent-list');
  if (!el) return;
  const list = [];
  if (game.hasDagger) list.push('匕首');
  if (game.hasGun) list.push(game.gunLevel >= 2 ? '手枪·圣弹' : game.gunLevel >= 1 ? '手枪·穿透' : '手枪');
  if (game.backpackLevel > 0) list.push(`背包扩容 ${game.backpackLevel}`);
  if (game.curseEyeLevel > 0) list.push(`诅咒之眼 ${game.curseEyeLevel}`);
  if (game.purifyEyeLevel > 0) list.push(`净化之眼 ${game.purifyEyeLevel}`);
  if (game.hasMerchantGuild) list.push('商会会员');
  if (game.hasPharaohSeal) list.push('法老之印');
  el.innerHTML = list.length ? list.map(x => `<span>${x}</span>`).join('') : '暂无';
}

function selectItemSlot(index) {
  const items = getPlayerItems();
  if (index >= items.length) return;
  game.selectedSlot = index;
  renderItemGrid();
}

function useSelectedItem() {
  const items = getPlayerItems();
  const idx = game.selectedSlot || 0;
  if (idx >= items.length) return;
  const item = items[idx];
  if (game.aim) {
    if (game.aim.itemId === item.id) {
      cancelAim('已取消瞄准，物品未消耗。');
      return;
    }
    cancelAim();
  }
  if (game.teleportSelect) {
    if (item.id === 'scroll') {
      game.teleportSelect = null;
      log('已取消传送，卷轴未消耗。');
      render();
      return;
    }
    game.teleportSelect = null;
  }
  if (item.type === 'permanent') {
    log('匕首是永久武器，会在接近怪物时自动使用。');
    return;
  }
  item.use();
}

newGame(true);
</script>
