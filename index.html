<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>绝命寻宝：法老的诅咒</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at center, #2a1810 0%, #0d0604 100%);
    color: #e8d4a0;
    font-family: "Georgia", "Times New Roman", serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    user-select: none;
    overflow: hidden;
  }
  #game-wrapper {
    display: grid;
    grid-template-columns: 220px auto 220px;
    gap: 18px;
    align-items: start;
  }
  .panel {
    background: linear-gradient(180deg, rgba(58,37,21,0.94) 0%, rgba(37,18,8,0.96) 100%), url("assets/ui/panel_bg.png") center / 96px 96px repeat;
    border: 2px solid #8b6a3a;
    border-radius: 6px;
    padding: 14px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6), inset 0 0 8px rgba(139,106,58,0.3);
  }
  h1 {
    font-size: 22px;
    text-align: center;
    color: #f4d27a;
    text-shadow: 0 0 10px #8b4513, 2px 2px 0 #1a0a04;
    letter-spacing: 4px;
    margin-bottom: 6px;
    font-weight: bold;
  }
  .subtitle {
    font-size: 10px;
    text-align: center;
    color: #a08660;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
    font-size: 14px;
  }
  .stat-label { color: #a08660; }
  .stat-value { color: #f4d27a; font-weight: bold; }
  .hp-hearts { color: #d44; font-size: 16px; letter-spacing: 2px; }
  .hp-hearts.hp-low {
    color: #ff1f1f;
    text-shadow: 0 0 8px #9b0000, 0 0 14px #ff2222;
    animation: hp-shake 0.28s infinite;
  }
  #board-container {
    position: relative;
  }
  #board-container::before,
  #board-container::after {
    pointer-events: none;
  }
  #board-container::before {
    content: "";
    position: absolute;
    inset: -10px;
    z-index: 4;
    border-radius: 10px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  #board-container.curse-warning::before {
    opacity: 1;
    background:
      linear-gradient(90deg, rgba(126, 35, 180, 0.42), rgba(126, 35, 180, 0.12) 8%, transparent 18%, transparent 82%, rgba(126, 35, 180, 0.12) 92%, rgba(126, 35, 180, 0.42)),
      linear-gradient(0deg, rgba(126, 35, 180, 0.42), rgba(126, 35, 180, 0.12) 8%, transparent 18%, transparent 82%, rgba(126, 35, 180, 0.12) 92%, rgba(126, 35, 180, 0.42));
    box-shadow: 0 0 22px rgba(154, 70, 255, 0.55), inset 0 0 28px rgba(126, 35, 180, 0.35);
    animation: curse-edge-pulse 2.1s ease-in-out infinite;
  }
  #board-container.curse-critical::before {
    opacity: 1;
    background:
      linear-gradient(90deg, rgba(72, 0, 125, 0.75), rgba(128, 0, 180, 0.32) 14%, transparent 28%, transparent 72%, rgba(128, 0, 180, 0.32) 86%, rgba(72, 0, 125, 0.75)),
      linear-gradient(0deg, rgba(72, 0, 125, 0.75), rgba(128, 0, 180, 0.32) 14%, transparent 28%, transparent 72%, rgba(128, 0, 180, 0.32) 86%, rgba(72, 0, 125, 0.75));
    box-shadow: 0 0 34px rgba(130, 0, 255, 0.95), inset 0 0 42px rgba(105, 0, 160, 0.62);
    animation: curse-edge-pulse-heavy 1.45s ease-in-out infinite;
  }
  #board-container.purify-flash::after {
    content: "☥";
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 8;
    color: #82ffad;
    font-size: 62px;
    text-shadow: 0 0 12px #35ff7c, 0 0 28px #9cffc0;
    animation: purify-ankh-rise 0.9s ease-out forwards;
  }
  .purify-reduce-float {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 9;
    transform: translate(-50%, 28px);
    color: #b6ffca;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #35ff7c, 0 0 24px #9cffc0, 1px 1px 0 #0b2b16;
    pointer-events: none;
    animation: purify-reduce-rise 0.95s ease-out forwards;
  }
  .center-float {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 30;
    transform: translate(-50%, 8px);
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
    pointer-events: none;
    animation: purify-reduce-rise 0.95s ease-out forwards;
  }
  .center-float.gold {
    color: #ffd966;
    text-shadow: 0 0 10px #ffd966, 0 0 24px #8a4a00, 1px 1px 0 #2a1300;
  }
  .center-float.item {
    color: #8ee8ff;
    text-shadow: 0 0 10px #58d9ff, 0 0 24px #0c4a66, 1px 1px 0 #021923;
  }
  .center-float.curse {
    color: #ff5a9e;
    text-shadow: 0 0 10px #ff2a7a, 0 0 24px #7f1dff, 1px 1px 0 #260018;
  }
  .center-float.recover {
    color: #79ff9d;
    text-shadow: 0 0 10px #35ff7c, 0 0 24px #9cffc0, 1px 1px 0 #0b2b16;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(12, 42px);
    grid-template-rows: repeat(12, 42px);
    gap: 2px;
    background: #1a0a04;
    padding: 6px;
    border: 3px solid #8b6a3a;
    border-radius: 4px;
    box-shadow: 0 0 30px rgba(139,69,19,0.4);
    position: relative;
    z-index: 1;
    overflow: visible;
  }
  #board.low-hp {
    border-color: #8f1212;
    box-shadow: 0 0 34px rgba(170, 0, 0, 0.72), inset 0 0 24px rgba(105, 0, 0, 0.4);
  }
  #board-container.purify-flash #board {
    border-color: #71ff9a;
    box-shadow: 0 0 34px rgba(65, 255, 130, 0.95), inset 0 0 22px rgba(90, 255, 150, 0.38);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .cell {
    width: 42px;
    height: 42px;
    background: #0a0402 url("assets/floor_tile.png") center / cover no-repeat;
    border-radius: 2px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    position: relative;
    transition: background 0.15s;
    cursor: pointer;
  }
  .cell.fog {
    background: #0a0402;
    background-image: radial-gradient(circle, #1a0a04 30%, #0a0402 70%);
  }
  .cell.fog.monster-hint::before {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255, 42, 42, 0.72);
    box-shadow: 0 0 12px rgba(255, 42, 42, 0.95), 0 0 22px rgba(255, 42, 42, 0.45);
    animation: pulse 1.8s infinite;
  }
  .cell.fog.purify-hint::before {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(88, 255, 135, 0.72);
    box-shadow: 0 0 12px rgba(88, 255, 135, 0.95), 0 0 22px rgba(88, 255, 135, 0.45);
    animation: pulse 1.8s infinite;
  }
  .cell.revealed {
    background: #4a3220 url("assets/floor_tile.png") center / cover no-repeat;
  }
  .cell.pit {
    background: #17100c !important;
    box-shadow: inset 0 0 12px #000;
  }
  .cell.pit::before,
  .cell.pit::after {
    content: "";
    position: absolute;
    width: 28px;
    height: 4px;
    background: #7b2c1f;
    border-radius: 2px;
    box-shadow: 0 0 5px rgba(0,0,0,0.7);
  }
  .cell.pit::before { transform: rotate(45deg); }
  .cell.pit::after { transform: rotate(-45deg); }
  .cell.cracked {
    background: linear-gradient(135deg, #5b4a36 0%, #2c2118 100%) !important;
    box-shadow: inset 0 0 8px rgba(255, 210, 128, 0.25);
  }
  .cell.cracked::before {
    content: "╱╲";
    color: #d6a84f;
    font-size: 18px;
    letter-spacing: -3px;
    transform: rotate(-12deg);
  }
  .cell.wall-n { border-top: 4px solid #c0a070; }
  .cell.wall-e { border-right: 4px solid #c0a070; }
  .cell.wall-s { border-bottom: 4px solid #c0a070; }
  .cell.wall-w { border-left: 4px solid #c0a070; }
  .cell.start {
    background: #6b4a26 !important;
    box-shadow: inset 0 0 6px #f4d27a;
  }
  .cell.escape-target {
    background: radial-gradient(circle, #145f96 0%, #143856 60%, #6b4a26 100%) !important;
    box-shadow: 0 0 18px #58d9ff, 0 0 32px rgba(88,217,255,0.9), inset 0 0 10px #c8f6ff !important;
    animation: escape-blue-pulse 0.75s ease-in-out infinite;
  }
  .cell.escape-arrow::before {
    content: attr(data-escape-arrow);
    position: absolute;
    z-index: 16;
    color: #58d9ff;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 8px #58d9ff, 0 0 16px #d8fbff, 1px 1px 0 #022438;
    animation: escape-arrow-pulse 0.65s ease-in-out infinite;
  }
  @keyframes escape-blue-pulse {
    0%,100% { filter: brightness(1); transform: scale(1); }
    50% { filter: brightness(1.8); transform: scale(1.05); }
  }
  @keyframes escape-arrow-pulse {
    0%,100% { opacity: 0.65; transform: translateY(0) scale(0.92); }
    50% { opacity: 1; transform: translateY(-2px) scale(1.12); }
  }
  .cell.player::after {
    content: "";
    width: 34px;
    height: 34px;
    background: url("assets/player.png") center / contain no-repeat;
    filter: drop-shadow(0 0 4px #f4d27a);
    z-index: 10;
  }
  .cell.treasure::before { font-size: 20px; }
  .cell.coin::before { content: "🪙"; }
  .cell.bag::before { content: "💰"; }
  .cell.diamond::before { content: "💎"; filter: drop-shadow(0 0 5px #8ee8ff); }
  .cell.relic {
    background: radial-gradient(circle, #8f1d13 0%, #2b0905 72%) !important;
    box-shadow: 0 0 14px #ffd76a, inset 0 0 10px rgba(120,0,0,0.85);
  }
  .cell.relic::before {
    content: attr(data-relic-icon);
    font-size: 23px;
    filter: drop-shadow(0 0 7px gold) drop-shadow(0 0 10px #8b0000);
    animation: pulse 1.2s infinite;
  }
  .cell.memory-hint::after {
    content: "";
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: rgba(255,255,255,0.82);
    box-shadow: 0 0 10px #fff, 0 0 18px #ffeeb2;
    z-index: 4;
  }
  .cell.cursed-ground {
    box-shadow: inset 0 0 12px #8a00b6, 0 0 8px rgba(160,0,220,0.65);
  }
  .cell.cursed-ground::after {
    content: "✦";
    position: absolute;
    color: #b42cff;
    font-size: 16px;
    opacity: 0.8;
  }
  .cell.quicksand {
    background: radial-gradient(circle, #7b5a24 0%, #31200c 78%) !important;
    box-shadow: inset 0 0 13px #c69737;
  }
  .cell.quicksand::before {
    content: "≋";
    color: #e2bd68;
    font-size: 22px;
    filter: drop-shadow(0 0 4px #000);
  }
  .cell.cursed-well {
    background: radial-gradient(circle, #3b0050 0%, #09020c 76%) !important;
    box-shadow: inset 0 0 14px #000, 0 0 13px rgba(190, 50, 255, 0.8);
  }
  .cell.cursed-well::before {
    content: "♆";
    color: #d36cff;
    font-size: 23px;
    filter: drop-shadow(0 0 7px #b42cff);
  }
  .cell.scarab-nest {
    background: radial-gradient(circle, #090604 0%, #28170d 70%) !important;
    box-shadow: inset 0 0 14px #000, 0 0 8px rgba(118,82,40,0.8);
  }
  .cell.scarab-nest::before {
    content: "◉";
    color: #1a0f08;
    font-size: 25px;
    text-shadow: 0 0 5px #d6a84f;
  }
  .cell.scarab-nest::after {
    content: "⌁";
    color: #8f7040;
    font-size: 18px;
    transform: translate(10px, 8px);
  }
  .cell.trapdoor {
    background: #342719 !important;
    box-shadow: inset 0 0 8px rgba(180,170,145,0.35);
  }
  .cell.trapdoor::before {
    content: "▢";
    color: rgba(185,175,150,0.45);
    font-size: 22px;
  }
  .cell.jackal-lair {
    background: radial-gradient(circle, #44220b 0%, #160b04 78%) !important;
    box-shadow: inset 0 0 13px #000, 0 0 9px rgba(190,110,35,0.8);
  }
  .cell.jackal-lair::before {
    content: "⌂";
    color: #d68b3a;
    font-size: 23px;
    filter: drop-shadow(0 0 5px #000);
  }
  .cell.bomb::before { content: "💣"; font-size: 20px; }
  .cell.well {
    background: linear-gradient(135deg, #28425a 0%, #102238 100%) !important;
    box-shadow: 0 0 10px #5ab8ff, inset 0 0 8px #082033;
  }
  .cell.well::before {
    content: "♒";
    color: #8ed7ff;
    font-size: 24px;
    font-weight: bold;
    filter: drop-shadow(0 0 5px #8ed7ff);
  }
  .cell.monster {
    background: #4a1818 !important;
    box-shadow: 0 0 8px #c33, inset 0 0 4px #500;
  }
  .cell.monster::before { font-size: 22px; animation: shake 0.6s infinite; }
  .cell.monster.sleeping {
    background: #4a3220 url("assets/floor_tile.png") center / cover no-repeat !important;
    opacity: 1;
    box-shadow: inset 0 0 8px #222;
  }
  .cell.monster.sleeping::before {
    opacity: 0.86;
    filter: grayscale(0.35) brightness(0.95);
    animation: none;
  }
  .cell.monster.sleeping::after {
    content: "💤";
    position: absolute;
    top: -7px;
    right: -5px;
    font-size: 14px;
    z-index: 18;
    filter: drop-shadow(0 0 3px #d9e8ff);
  }
  .cell.monster.waking {
    animation: monster-waking 0.18s infinite;
    box-shadow: 0 0 14px #ff7a2a, inset 0 0 8px #5a1a00;
  }
  .cell.monster.waking::after {
    content: "!";
    position: absolute;
    top: -6px;
    right: 2px;
    color: #ffd966;
    font-size: 20px;
    font-weight: bold;
    z-index: 18;
    text-shadow: 0 0 5px #f00;
  }
  .cell.mummy::before { content: "🧟"; }
  .cell.bat::before { content: "🦇"; }
  .cell.ghost::before { content: "👻"; filter: drop-shadow(0 0 5px #d9e8ff); }
  .cell.scarab-monster::before { content: "🪲"; }
  .cell.scorpion::before { content: "🦂"; }
  .cell.priest::before { content: "☥"; color: #d9ccff; text-shadow: 0 0 8px #9b6bff; }
  .cell.gargoyle::before { content: "🗿"; }
  .cell.jackal::before { content: "🐺"; }
  .cell.giant-scarab::before { content: "🪲"; font-size: 28px; filter: drop-shadow(0 0 8px #d6a84f) drop-shadow(0 0 8px #8b0000); }
  .cell.petrified { filter: grayscale(1) brightness(0.75); opacity: 0.85; }
  .cell.enraged { animation: curse-text-warp 0.7s ease-in-out infinite; }
  .cell.attacked::after {
    content: "💥";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    animation: attack-burst 0.45s ease-out;
    z-index: 20;
  }
  .cell.elite {
    background: #4a0000 !important;
    box-shadow: 0 0 12px #f00, inset 0 0 6px #800;
  }
  .cell.elite::before { content: "🐍"; font-size: 24px; filter: drop-shadow(0 0 4px red); animation: shake 0.4s infinite; }
  .cell.flashlit {
    background: linear-gradient(135deg, #8a6a3e 0%, #6a4828 100%) !important;
    box-shadow: inset 0 0 8px #ffd966;
  }
  .cell.target-line {
    outline: 2px solid #72d7ff;
    box-shadow: inset 0 0 10px rgba(114, 215, 255, 0.8), 0 0 8px rgba(114, 215, 255, 0.7);
  }
  .cell.target-impact {
    outline: 2px solid #ffd966;
    box-shadow: inset 0 0 12px rgba(255, 217, 102, 0.95), 0 0 12px rgba(255, 217, 102, 0.8);
  }
  .cell.target-invalid {
    outline: 2px solid #d44;
    box-shadow: inset 0 0 10px rgba(220, 68, 68, 0.8);
  }
  .cell.purify {
    background: linear-gradient(135deg, #2a6a3e 0%, #15402a 100%) !important;
    box-shadow: 0 0 10px #4ae07a, inset 0 0 6px #6affa2;
    animation: purify-glow 1.6s ease-in-out infinite;
  }
  .cell.purify::before {
    font-size: 22px;
    filter: drop-shadow(0 0 4px #6affa2);
  }
  .cell.purify.scarab::before { content: "🪲"; }
  .cell.purify.water::before { content: "💧"; }
  .cell.purify.eye::before { content: "👁️"; }
  .cell.purify.altar::before { content: "✨"; }
  .cell.coin::before,
  .cell.bag::before,
  .cell.diamond::before,
  .cell.start::before,
  .cell.relic::before,
  .cell.pit::before,
  .cell.cracked::before,
  .cell.well::before,
  .cell.cursed-well::before,
  .cell.cursed-ground::before,
  .cell.quicksand::before,
  .cell.scarab-nest::before,
  .cell.trapdoor::before,
  .cell.jackal-lair::before,
  .cell.bomb::before,
  .cell.purify::before,
  .cell.monster::before {
    content: "" !important;
    display: block;
    width: 32px;
    height: 32px;
    background-position: center;
    background-size: contain;
    background-repeat: no-repeat;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.65));
  }
  .cell.player::after {
    background-image: url("assets/sprites/explorer.png");
    image-rendering: pixelated;
  }
  .cell.coin::before { background-image: url("assets/sprites/treasure_coin.png"); }
  .cell.bag::before { background-image: url("assets/sprites/treasure_bag.png"); }
  .cell.diamond::before { background-image: url("assets/sprites/treasure_diamond.png"); }
  .cell.start::before { background-image: url("assets/sprites/terrain_exit.png"); }
  .cell.relic::before { background-image: url("assets/sprites/relic_generic.png"); }
  .cell.pit::before { background-image: url("assets/sprites/terrain_pit.png"); }
  .cell.pit::after { display: none; }
  .cell.cracked::before { background-image: url("assets/sprites/terrain_cracked.png"); transform: none; }
  .cell.well::before { background-image: url("assets/sprites/terrain_well.png"); }
  .cell.cursed-well::before { background-image: url("assets/sprites/terrain_cursed_well.png"); }
  .cell.cursed-ground::before { background-image: url("assets/sprites/terrain_cursed_ground.png"); }
  .cell.cursed-ground::after { display: none; }
  .cell.quicksand::before { background-image: url("assets/sprites/terrain_quicksand.png"); }
  .cell.scarab-nest::before { background-image: url("assets/sprites/terrain_scarab_nest.png"); }
  .cell.scarab-nest::after { display: none; }
  .cell.trapdoor::before { background-image: url("assets/sprites/terrain_trapdoor.png"); }
  .cell.jackal-lair::before { background-image: url("assets/sprites/terrain_jackal_lair.png"); }
  .cell.bomb::before { background-image: url("assets/sprites/item_bomb.png"); }
  .cell.purify.scarab::before { background-image: url("assets/sprites/purify_scarab.png"); }
  .cell.purify.water::before { background-image: url("assets/sprites/purify_water.png"); }
  .cell.purify.eye::before { background-image: url("assets/sprites/purify_eye.png"); }
  .cell.purify.altar::before { background-image: url("assets/sprites/purify_altar.png"); }
  .cell.bat::before { background-image: url("assets/sprites/monster_bat.png"); }
  .cell.mummy::before { background-image: url("assets/sprites/monster_mummy.png"); }
  .cell.ghost::before { background-image: url("assets/sprites/monster_ghost.png"); }
  .cell.scarab-monster::before { background-image: url("assets/sprites/monster_scarab.png"); }
  .cell.priest::before { background-image: url("assets/sprites/monster_priest.png"); }
  .cell.scorpion::before,
  .cell.gargoyle::before,
  .cell.jackal::before,
  .cell.giant-scarab::before {
    position: absolute;
    left: 50%;
    bottom: -2px;
    width: 64px;
    height: 64px;
    transform: translateX(-50%);
    z-index: 19;
    background-size: contain;
  }
  .cell.scorpion::before { background-image: url("assets/sprites/monster_scorpion.png"); }
  .cell.gargoyle::before { background-image: url("assets/sprites/monster_gargoyle.png"); }
  .cell.jackal::before { background-image: url("assets/sprites/monster_jackal.png"); }
  .cell.giant-scarab::before { background-image: url("assets/sprites/monster_giant_scarab.png"); }
  .cell.cursed-well,
  .cell.scarab-nest,
  .cell.trapdoor,
  .cell.jackal-lair,
  .cell.cursed-ground,
  .cell.quicksand,
  .cell.pit,
  .cell.cracked,
  .cell.well {
    background-position: center !important;
    background-size: 32px 32px !important;
    background-repeat: no-repeat !important;
  }
  .cell.cursed-well { background-image: url("assets/sprites/terrain_cursed_well.png") !important; }
  .cell.scarab-nest { background-image: url("assets/sprites/terrain_scarab_nest.png") !important; }
  .cell.trapdoor { background-image: url("assets/sprites/terrain_trapdoor.png") !important; }
  .cell.jackal-lair { background-image: url("assets/sprites/terrain_jackal_lair.png") !important; }
  .cell.cursed-ground { background-image: url("assets/sprites/terrain_cursed_ground.png") !important; }
  .cell.quicksand { background-image: url("assets/sprites/terrain_quicksand.png") !important; }

function rng(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[rng(0, arr.length - 1)]; }
function pickWeighted(map) {
  const keys = Object.keys(map);
  const total = keys.reduce((s, k) => s + (map[k].weight || 1), 0);
  let r = Math.random() * total;
  for (const k of keys) {
    r -= (map[k].weight || 1);
    if (r <= 0) return k;
  }
  return keys[0];
}
function currentMapSize() { return game.mapSize || SIZE; }
function inBounds(x, y) { const s = currentMapSize(); return x >= 0 && x < s && y >= 0 && y < s; }
function dist(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
function keyOf(x, y) { return `${x},${y}`; }

      monsters: Array.isArray(data.monsters) ? data.monsters : [],
      monsterKills: Array.isArray(data.monsterKills) ? data.monsterKills : [],
      relics: Array.isArray(data.relics) ? data.relics : [],
    };
  } catch {
    return { terrains: [], monsters: [], monsterKills: [], relics: [] };
  }
}
function saveNotebook(data) { localStorage.setItem(NOTEBOOK_KEY, JSON.stringify(data)); }
function unlockNotebook(kind, id) {
  if (!id) return;

  if (!data[kind]) return;
  if (!data[kind].includes(id)) {
    data[kind].push(id);
    saveNotebook(data);
  }
}
function markMonsterKilled(type) {
  const data = getNotebook();
  if (!data.monsters.includes(type)) data.monsters.push(type);

  saveNotebook(data);
}

  setupAudio();
  if (!audioState.enabled || !audioState.started || game.over) return;
  const next = game.poisonTurns > 0 ? 'poison' : game.hp <= 1 ? 'danger' : 'normal';
  if (!force && next === audioState.currentBgm) return;
  Object.entries(audioState.bgm).forEach(([k, a]) => {
    if (k === next) {
      a.volume = next === 'normal' ? 0.22 : 0.28;
      a.play().catch(() => {});
    } else {
      a.pause();
      a.currentTime = 0;
    }
  });
  audioState.currentBgm = next;
}

function stopBgm() {
  setupAudio();
  Object.values(audioState.bgm).forEach(a => { a.pause(); a.currentTime = 0; });
  audioState.currentBgm = '';
}
function getAdventureMapSize() {
  if (game.adventures >= 10) return 120;
  if (game.adventures >= 5) return 40;
  if (game.adventures >= 3) return 20;
  return 12;
}

function hasRelic(id) {
  return Array.isArray(game.collectedRelics) && game.collectedRelics.includes(id);
}

function getMaxHp() {
  const conquerBonus = game.pharaohConquered ? 2 : 0;
  const hourglassPenalty = game.hourglassPenalty || 0;
  return Math.max(1, STARTUP_HP + conquerBonus - hourglassPenalty);
}

function getVisionRadius() {
  return hasRelic('sun_disk') ? 2 : 1;
}

function getDamageAmount(base) {
  return hasRelic('bronze_scepter') ? Math.round(base * 1.5) : base;
}

function getGoldAmount(base) {
  let multiplier = 1;
  if (hasRelic('golden_mask')) multiplier += 0.3;
  if (hasRelic('serpent_eye')) multiplier += 0.5;
  return Math.round(base * multiplier);
}

function getMoveCurseGain() {
  let amount = CURSE_PER_MOVE;
  if (hasRelic('eternal_jar')) amount *= 0.5;
  if (hasRelic('serpent_eye')) amount *= 1.5;
  amount = Math.max(1, Math.round(amount));
  if (hasRelic('sandstorm_ring')) {
    game.sandstormStep = (game.sandstormStep || 0) + 1;
    if (game.sandstormStep % 2 === 1) amount = 0;
  }
  return amount;
}

function hasAnyWeapon() {
  return !!(game.hasDagger || game.hasGun);
}

function hasEverHadHolyLight() {
  return !!(game.holyLights > 0 || game.everHadHolyLight || game.hasPharaohSeal);
}

function log(msg, cls = '') {
  const el = document.getElementById('log');
  const p = document.createElement('p');
  if (cls) p.className = cls;
  p.innerHTML = msg;
  el.insertBefore(p, el.firstChild);
  while (el.children.length > 40) el.removeChild(el.lastChild);
}

function createMonster(type, x, y, extra = {}) {
  const def = MONSTER_TYPES[type];
  return { id: game.monsterIdSeq++, x, y, type, hp: def.hp, maxHp: def.hp, ...extra };
}

function newGame(firstTime = true) {
  if (game.gameOverTimer) {
    clearTimeout(game.gameOverTimer);
    game.gameOverTimer = null;
  }
  game.gameOverPending = false;
  if (audioState.started) updateBgmState(true);
  if (typeof game.gold !== 'number') game.gold = 0;
  if (typeof game.adventures !== 'number') game.adventures = 1;
  if (typeof game.hasDagger !== 'boolean') game.hasDagger = false;
  if (typeof game.flashlights !== 'number') game.flashlights = 0;
  if (typeof game.bombs !== 'number') game.bombs = 0;
  if (typeof game.scrolls !== 'number') game.scrolls = 0;
  if (typeof game.ropes !== 'number') game.ropes = 0;
  if (typeof game.hooks !== 'number') game.hooks = 0;
  if (typeof game.antidotes !== 'number') game.antidotes = 0;
  if (typeof game.holyLights !== 'number') game.holyLights = 0;
  if (typeof game.everHadHolyLight !== 'boolean') game.everHadHolyLight = game.holyLights > 0;
  if (typeof game.hasGun !== 'boolean') game.hasGun = false;
  if (typeof game.bullets !== 'number') game.bullets = 0;
  if (typeof game.backpackLevel !== 'number') game.backpackLevel = 0;
  if (typeof game.gunLevel !== 'number') game.gunLevel = 0;
  if (typeof game.curseEyeLevel !== 'number') game.curseEyeLevel = 0;
  if (typeof game.purifyEyeLevel !== 'number') game.purifyEyeLevel = 0;
  if (typeof game.hasMerchantGuild !== 'boolean') game.hasMerchantGuild = false;
  if (!Array.isArray(game.collectedRelics)) game.collectedRelics = [];
  if (typeof game.hourglassUsed !== 'boolean') game.hourglassUsed = false;
  if (typeof game.hourglassPenalty !== 'number') game.hourglassPenalty = 0;
  if (typeof game.pharaohConquered !== 'boolean') game.pharaohConquered = false;
  if (typeof game.hasPharaohSeal !== 'boolean') game.hasPharaohSeal = false;
  if (typeof game.pharaohGateUnlocked !== 'boolean') game.pharaohGateUnlocked = false;
  game.over = false;
  game.mapSize = getAdventureMapSize();
  game.turn = 1;
  game.curse = 0;
  game.hp = getMaxHp();
  game.adventureGold = 0;
  game.relicsCollected = game.collectedRelics.length;
  game.sandstormStep = 0;
  game.cursedGrounds = new Set();
  game.quicksands = new Set();
  game.cursedWells = new Set();
  game.scarabNests = {};
  game.trapdoors = new Set();
  game.jackalLairs = new Set();
  game.poisonTurns = 0;
  game.scarabTalismanGrace = false;
  game.empoweredCursedWells = new Set();
  game.placedBomb = null;
  game.flashlitCells = new Set();
  game.attackCell = null;
  game.cellEffects = [];
  game.aim = null;
  game.curseEyeMarks = new Set();
  game.purifyEyeMarks = new Set();
  game.monsterIdSeq = 1;
  game.shopOpen = false;
  game.modalOpen = false;

  // start position
  if (firstTime) {
    const c = Math.floor(game.mapSize / 2);
    game.start = { x: c, y: c };
  } else {
    game.start = { x: rng(2, game.mapSize - 3), y: rng(2, game.mapSize - 3) };
  }
  game.player = { x: game.start.x, y: game.start.y };
  game.exits = new Set([keyOf(game.start.x, game.start.y)]);
  if (game.adventures >= 5) addExtraExits();
  game.crackedFloors = new Set();
  game.pendingCrackCollapse = '';

  game.relics = {};

  buildTerrain();
  buildWells();
  buildHazardGrounds();
  updateRelicWindow();
  buildRelics();
  buildNewTerrain();

  // build monsters: first adventure is fixed, later adventures are random
  game.monsters = [];
  buildMonsters();
  buildSpecialMonsters();
  updateCurseEyeMarks();

  // build treasures
  game.treasures = {};
  const treasureChance = getTreasureChance();
  for (let y = 0; y < game.mapSize; y++) {
    for (let x = 0; x < game.mapSize; x++) {
      const key = `${x},${y}`;
      if (
        !(x === game.start.x && y === game.start.y) &&
        !isExit(x, y) &&
        !game.pits.has(key) &&
        !game.relics[key] &&
        !game.wells.has(key) &&
        !(game.cursedWells && game.cursedWells.has(key)) &&
        !(game.crackedFloors && game.crackedFloors.has(key)) &&
        !(game.quicksands && game.quicksands.has(key)) &&
        !(game.cursedGrounds && game.cursedGrounds.has(key)) &&
        !(game.scarabNests && game.scarabNests[key]) &&
        !(game.trapdoors && game.trapdoors.has(key)) &&
        !(game.jackalLairs && game.jackalLairs.has(key)) &&
        !monsterAt(x, y) &&
        Math.random() < treasureChance
      ) {
        game.treasures[key] = makeTreasure(x, y);
      }
    }
  }

  // build purify items - first adventure is safer; later adventures still provide support
  game.purifies = {};
  const purifyCount = game.adventures === 1 ? rng(8, 10) : rng(4, 7);
  let purAttempts = 0;
  while (Object.keys(game.purifies).length < purifyCount && purAttempts < 400) {
    purAttempts++;
    const x = rng(0, game.mapSize - 1);
    const y = rng(0, game.mapSize - 1);
    const key = `${x},${y}`;
    if (x === game.start.x && y === game.start.y) continue;
    if (isExit(x, y)) continue;
    if (game.adventures === 1 && dist({ x, y }, game.start) <= 3) continue;
    if (game.pits.has(key) || game.relics[key] || game.treasures[key] || game.wells.has(key) || (game.cursedWells && game.cursedWells.has(key)) || (game.crackedFloors && game.crackedFloors.has(key)) || (game.quicksands && game.quicksands.has(key)) || (game.cursedGrounds && game.cursedGrounds.has(key))) continue;
    if (monsterAt(x, y)) continue;
    game.purifies[key] = pickWeighted(PURIFY_TYPES);
  }
  if (game.adventures === 1) addFirstAdventureSafetyPurifies();
  updatePurifyEyeMarks();

  // fog of war / revealed
  game.revealed = Array.from({length: game.mapSize}, () => Array(game.mapSize).fill(false));
  revealInitialArea();
  applyMemoryTabletHints();

  buildBoard();
  document.getElementById('log').innerHTML = '';
  log(`第 ${game.adventures} 次冒险开始。`, 'important');
  log('你踏入了远古遗迹的大门……', 'important');
  log('迷雾笼罩，未知的财富等待着勇者。');
  log('每一步移动都会加深诅咒，注意拾取绿色净化道具。');
  if (game.hasPharaohSeal) {
    game.holyLights++;
    game.everHadHolyLight = true;
    log('法老之印发出微光：本次探险初始获得 1 个圣光术。', 'gold');
  }
  render();
  if (firstTime) {
    showOpeningStory();
  } else if (game.adventures === 10) {
    showEndlessStory();
  }
}

function addExtraExits() {
  const count = game.adventures >= 10 ? Math.max(8, Math.floor(game.mapSize / 20) * 2) : 1;
  let attempts = 0;
  while (game.exits.size < count + 1 && attempts < 1000) {
    attempts++;
    const x = rng(2, game.mapSize - 3);
    const y = rng(2, game.mapSize - 3);
    if (dist({ x, y }, game.start) < 8) continue;
    game.exits.add(keyOf(x, y));
  }
}

function addFirstAdventureSafetyPurifies() {
  const candidates = [];
  for (let y = game.start.y - 3; y <= game.start.y + 3; y++) {
    for (let x = game.start.x - 3; x <= game.start.x + 3; x++) {
      const key = `${x},${y}`;
      if (!inBounds(x, y)) continue;
      if (x === game.start.x && y === game.start.y) continue;
      if (isExit(x, y)) continue;
      if (dist({ x, y }, game.start) <= 3) continue;
      if (Math.abs(x - game.start.x) + Math.abs(y - game.start.y) > 4) continue;
      if (game.pits.has(key) || game.relics[key] || game.treasures[key] || game.purifies[key] || game.wells.has(key)) continue;
      if (monsterAt(x, y)) continue;
      candidates.push({ x, y });
    }
  }
  candidates.sort(() => Math.random() - 0.5);
  candidates.slice(0, 4).forEach((p, i) => {
    game.purifies[`${p.x},${p.y}`] = i === 0 ? 'water' : 'scarab';
  });
}

function updateRelicWindow() {
  const idx = Math.floor((game.adventures - 1) / 5);
  if (game.relicWindowIndex !== idx) {
    game.relicWindowIndex = idx;
    game.relicWindowMaps = 0;
  }
  if (typeof game.relicWindowMaps !== 'number') game.relicWindowMaps = 0;
}

function getRelicCountForMap() {
  if (game.adventures < 3) return 0;
  const positionInWindow = ((game.adventures - 1) % 5) + 1;
  if (game.relicWindowMaps >= 3) return 0;
  if (positionInWindow === 5 && game.relicWindowMaps === 0) return 1;
  const roll = Math.random();
  if (roll < 0.05 && game.relicWindowMaps <= 1) return 2;
  if (roll < 0.15) return 1;
  return 0;
}

function buildRelics() {
  const count = getRelicCountForMap();
  if (count <= 0) return;
  const available = RELIC_DEFS.filter(r => !hasRelic(r.id)).sort(() => Math.random() - 0.5);
  let attempts = 0;
  while (Object.keys(game.relics).length < count && attempts < 800 && available.length) {
    attempts++;
    const x = rng(0, game.mapSize - 1);
    const y = rng(0, game.mapSize - 1);
    const key = keyOf(x, y);
    if (x === game.start.x && y === game.start.y) continue;
    if (isExit(x, y)) continue;
    if (Math.abs(x - game.start.x) <= 2 && Math.abs(y - game.start.y) <= 2) continue;
    if (game.pits.has(key) || (game.crackedFloors && game.crackedFloors.has(key))) continue;
    if (game.quicksands && game.quicksands.has(key)) continue;
    if (game.cursedGrounds && game.cursedGrounds.has(key)) continue;
    if (game.wells && game.wells.has(key)) continue;
    if (game.cursedWells && game.cursedWells.has(key)) continue;
    if (game.relics[key]) continue;
    if (monsterAt(x, y)) continue;
    const relic = available.pop();
    game.relics[key] = relic.id;
  }
  if (Object.keys(game.relics).length > 0) game.relicWindowMaps++;
}

function applyMemoryTabletHints() {
  game.memoryRelicHints = new Set();
  if (!hasRelic('memory_tablet')) return;
  const relicSpots = Object.keys(game.relics || {}).map(k => {
    const [x, y] = k.split(',').map(Number);
    return { x, y, key: k, d: dist({ x, y }, game.player) };
  }).sort((a, b) => a.d - b.d).slice(0, 3);
  relicSpots.forEach(p => game.memoryRelicHints.add(p.key));
}

function buildTerrain() {
  game.pits = new Set();
  const pitCount = Math.round((Math.random() < 0.8 ? rng(4, 8) : rng(0, 3)) * game.mapSize / 12);
  let attempts = 0;
  while (game.pits.size < pitCount && attempts < 300) {
    attempts++;
    const x = rng(0, game.mapSize - 1);
    const y = rng(0, game.mapSize - 1);
    const key = `${x},${y}`;
    if (x === game.start.x && y === game.start.y) continue;
    if (isExit(x, y)) continue;
    if (Math.abs(x - game.start.x) <= 1 && Math.abs(y - game.start.y) <= 1) continue;
    if (game.relics[key]) continue;
    game.pits.add(key);
  }

  game.walls = Array.from({ length: game.mapSize }, () =>
    Array.from({ length: game.mapSize }, () => ({ N: false, E: false, S: false, W: false }))
  );
  const wallTarget = Math.round(rng(16, 24) * game.mapSize / 12);
  let wallCount = 0;
  attempts = 0;
  while (wallCount < wallTarget && attempts < 600) {
    attempts++;
    const x = rng(0, game.mapSize - 1);
    const y = rng(0, game.mapSize - 1);
    const dir = pick(DIR_INFO);
    const nx = x + dir.dx;
    const ny = y + dir.dy;
    if (!inBounds(nx, ny)) continue;
    if (game.walls[y][x][dir.key]) continue;
    if (countWalls(x, y) >= 3 || countWalls(nx, ny) >= 3) continue;
    game.walls[y][x][dir.key] = true;
    game.walls[ny][nx][dir.opposite] = true;
    wallCount++;
  }
  buildCrackedFloors();
}

function buildCrackedFloors() {
  game.crackedFloors = new Set();
  if (game.adventures < 4) return;
  const target = Math.round(rng(4, 8) * game.mapSize / 20);
  let attempts = 0;
  while (game.crackedFloors.size < target && attempts < 600) {
    attempts++;
    const x = rng(0, game.mapSize - 1);
    const y = rng(0, game.mapSize - 1);
    const key = keyOf(x, y);
    if (x === game.start.x && y === game.start.y) continue;
    if (isExit(x, y)) continue;
    if (Math.abs(x - game.start.x) <= 1 && Math.abs(y - game.start.y) <= 1) continue;
    if (game.pits.has(key) || game.relics[key]) continue;
    game.crackedFloors.add(key);
  }
}

function canPlaceHazard(x, y) {
  const key = keyOf(x, y);
  return inBounds(x, y) &&
    !(x === game.start.x && y === game.start.y) &&
    !isExit(x, y) &&
    !(Math.abs(x - game.start.x) <= 1 && Math.abs(y - game.start.y) <= 1) &&
    !game.pits.has(key) &&
    !(game.crackedFloors && game.crackedFloors.has(key)) &&
    !(game.wells && game.wells.has(key)) &&
    !(game.cursedWells && game.cursedWells.has(key)) &&
    !game.relics[key] &&
    !(game.quicksands && game.quicksands.has(key)) &&
    !(game.cursedGrounds && game.cursedGrounds.has(key));
}

function buildHazardGrounds() {
  game.quicksands = new Set();
  game.cursedGrounds = new Set();
  game.cursedWells = new Set();
  if (game.adventures < 4) return;
  const scale = Math.max(1, game.mapSize / 20);
  const danger = Math.max(1, game.adventures - 3);
  const quickTarget = Math.random() < Math.min(0.45 + danger * 0.07, 0.9) ? Math.round(rng(1, 2 + Math.min(6, danger)) * scale) : 0;
  const cursedTarget = Math.random() < Math.min(0.5 + danger * 0.08, 0.92) ? Math.round(rng(1, 2 + Math.min(7, danger)) * scale) : 0;
  const cursedWellTarget = Math.random() < Math.min(0.18 + danger * 0.05, 0.55) ? Math.max(1, Math.round(scale / 2)) : 0;
  placeHazardSet(game.quicksands, quickTarget);
  placeHazardSet(game.cursedGrounds, cursedTarget);
  placeHazardSet(game.cursedWells, cursedWellTarget);
}

function placeHazardSet(set, target) {
  let attempts = 0;
  while (set.size < target && attempts < 800) {
    attempts++;
    const x = rng(0, game.mapSize - 1);
    const y = rng(0, game.mapSize - 1);
    if (!canPlaceHazard(x, y)) continue;
    set.add(keyOf(x, y));
  }
}

function canPlaceSpecialTerrain(x, y, opts = {}) {
  const key = keyOf(x, y);
  if (!inBounds(x, y)) return false;
  if (x === game.start.x && y === game.start.y) return false;
  if (isExit(x, y) && !opts.allowExit) return false;
  if (game.pits.has(key) || (game.wells && game.wells.has(key))) return false;
  if (game.cursedWells && game.cursedWells.has(key)) return false;
  if (game.crackedFloors && game.crackedFloors.has(key)) return false;
  if (game.quicksands && game.quicksands.has(key)) return false;
  if (game.cursedGrounds && game.cursedGrounds.has(key)) return false;
  if (game.scarabNests && game.scarabNests[key]) return false;
  if (game.trapdoors && game.trapdoors.has(key)) return false;
  if (game.jackalLairs && game.jackalLairs.has(key)) return false;
  if (!opts.allowRelic && game.relics && game.relics[key]) return false;
  return true;
}

function getRelicNearbyCells(radius = 5) {
  const cells = [];
  Object.keys(game.relics || {}).forEach(k => {
    const [rx, ry] = k.split(',').map(Number);
    for (let y = ry - radius; y <= ry + radius; y++) {
      for (let x = rx - radius; x <= rx + radius; x++) {
        if (inBounds(x, y) && dist({ x, y }, { x: rx, y: ry }) <= radius) cells.push({ x, y });
      }
    }
  });
  return cells.sort(() => Math.random() - 0.5);
}

function placeScarabNestAt(x, y) {
  game.scarabNests[keyOf(x, y)] = { released: 0, nextTurn: 0, exhausted: false };
}

function buildNewTerrain() {
  game.scarabNests = {};
  game.trapdoors = new Set();
  game.jackalLairs = new Set();
  if (game.adventures >= 3) buildScarabNests();
  if (game.adventures >= 5) buildTrapdoors();
  if (game.adventures >= 6) buildJackalLairs();
}

function buildScarabNests() {
  const target = game.adventures < 5 ? rng(1, 2) : Math.min(8, 2 + Math.floor((game.adventures - 5) / 3));
  const usedBlocks = new Set();
  const preferred = getRelicNearbyCells(5);
  let attempts = 0;
  while (Object.keys(game.scarabNests).length < target && attempts < 900) {
    attempts++;
    const p = preferred.length ? preferred.pop() : { x: rng(0, game.mapSize - 1), y: rng(0, game.mapSize - 1) };
    const block = `${Math.floor(p.x / 10)},${Math.floor(p.y / 10)}`;
    if (usedBlocks.has(block)) continue;
    if (!canPlaceSpecialTerrain(p.x, p.y)) continue;
    placeScarabNestAt(p.x, p.y);
    usedBlocks.add(block);
  }
}

function buildTrapdoors() {
  const target = Math.min(12, 2 + Math.floor((game.adventures - 5) / 2));
  let attempts = 0;
  while (game.trapdoors.size < target && attempts < 900) {
    attempts++;
    const x = rng(0, game.mapSize - 1);
    const y = rng(0, game.mapSize - 1);
    if (dist({ x, y }, game.start) < Math.max(6, Math.floor(game.mapSize / 4))) continue;
    if (!canPlaceSpecialTerrain(x, y)) continue;
    game.trapdoors.add(keyOf(x, y));
  }
}

function buildJackalLairs() {
  const target = Math.min(2, Math.max(1, Math.floor((game.adventures - 6) / 4) + 1));
  let attempts = 0;
  while (game.jackalLairs.size < target && attempts < 500) {
    attempts++;
    const edge = pick(['N', 'S', 'W', 'E']);
    const x = edge === 'W' ? rng(0, 3) : edge === 'E' ? rng(game.mapSize - 4, game.mapSize - 1) : rng(0, game.mapSize - 1);
    const y = edge === 'N' ? rng(0, 3) : edge === 'S' ? rng(game.mapSize - 4, game.mapSize - 1) : rng(0, game.mapSize - 1);
    if (!canPlaceSpecialTerrain(x, y)) continue;
    game.jackalLairs.add(keyOf(x, y));
  }
}

function buildWells() {
  game.wells = new Set();
  const usedFifteenBlocks = new Set();
  for (let by = 0; by < game.mapSize; by += 20) {
    for (let bx = 0; bx < game.mapSize; bx += 20) {
      const candidates = [];
      const maxY = Math.min(game.mapSize - 1, by + 19);
      const maxX = Math.min(game.mapSize - 1, bx + 19);
      for (let y = by; y <= maxY; y++) {
        for (let x = bx; x <= maxX; x++) {
          const key = keyOf(x, y);
          const block15 = `${Math.floor(x / 15)},${Math.floor(y / 15)}`;
          if (usedFifteenBlocks.has(block15)) continue;
          if (x === game.start.x && y === game.start.y) continue;
          if (isExit(x, y)) continue;
          if (game.pits.has(key)) continue;
          if (game.crackedFloors && game.crackedFloors.has(key)) continue;
          if (game.scarabNests && game.scarabNests[key]) continue;
          if (game.trapdoors && game.trapdoors.has(key)) continue;
          if (game.jackalLairs && game.jackalLairs.has(key)) continue;
          if (game.relics[key]) continue;
          if (Math.abs(x - game.start.x) <= 1 && Math.abs(y - game.start.y) <= 1) continue;
          candidates.push({ x, y, block15 });
        }
      }
      if (!candidates.length) continue;
      const p = pick(candidates);
      game.wells.add(keyOf(p.x, p.y));
      usedFifteenBlocks.add(p.block15);
    }
  }
}

function isEmptyGroundForWellWater(x, y) {
  const key = keyOf(x, y);
  return inBounds(x, y) &&
    !(x === game.player.x && y === game.player.y) &&
    !isExit(x, y) &&
    !game.pits.has(key) &&
    !(game.wells && game.wells.has(key)) &&
    !(game.cursedWells && game.cursedWells.has(key)) &&
    !(game.quicksands && game.quicksands.has(key)) &&
    !(game.cursedGrounds && game.cursedGrounds.has(key)) &&
    !game.relics[key] &&
    !game.treasures[key] &&
    !(game.purifies && game.purifies[key]) &&
    !monsterAt(x, y) &&
    !(game.placedBomb && game.placedBomb.x === x && game.placedBomb.y === y);
}

function spawnWellWater() {
  if (!game.wells || game.wells.size === 0) return;
  let spawned = 0;
  for (const wk of game.wells) {
    const [wx, wy] = wk.split(',').map(Number);
    const spots = [];
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;
        const x = wx + dx, y = wy + dy;
        if (isEmptyGroundForWellWater(x, y)) spots.push({ x, y });
      }
    }
    if (!spots.length) continue;
    const p = pick(spots);
    game.purifies[keyOf(p.x, p.y)] = 'water';
    spawned++;
  }
  if (spawned > 0) log(`水井涌动，${spawned} 处空地生成了生命之水。`, 'gold');
}

function spreadCursedWells() {
  if (!game.cursedWells || game.cursedWells.size === 0) return;
  let spread = 0;
  for (const wk of game.cursedWells) {
    const [wx, wy] = wk.split(',').map(Number);
    const radius = game.empoweredCursedWells && game.empoweredCursedWells.has(wk) ? 2 : 1;
    for (let y = wy - radius; y <= wy + radius; y++) {
      for (let x = wx - radius; x <= wx + radius; x++) {
        const key = keyOf(x, y);
        if (!inBounds(x, y) || key === wk || isExit(x, y)) continue;
        if (game.pits.has(key) || (game.wells && game.wells.has(key)) || (game.cursedWells && game.cursedWells.has(key))) continue;
        if (game.relics[key] || game.treasures[key] || (game.purifies && game.purifies[key])) continue;
        game.cursedGrounds.add(key);
        spread++;
      }
    }
  }
  if (spread > 0) log('诅咒水井涌出黑紫色污泥，周围地面被污染。', 'danger');
}

function hasRevealedWell() {
  if (!game.wells || game.wells.size === 0) return false;
  for (const wk of game.wells) {
    const [x, y] = wk.split(',').map(Number);
    if (game.revealed && game.revealed[y] && game.revealed[y][x]) return true;
    if (game.flashlitCells && game.flashlitCells.has(wk)) return true;
  }
  return false;
}

function hasWellInFifteenBlock(x, y) {
  if (!game.wells) return false;
  const bx = Math.floor(x / 15);
  const by = Math.floor(y / 15);
  for (const wk of game.wells) {
    const [wx, wy] = wk.split(',').map(Number);
    if (Math.floor(wx / 15) === bx && Math.floor(wy / 15) === by) return true;
  }
  return false;
}

function canSpawnAssistAt(x, y) {
  const key = keyOf(x, y);
  return inBounds(x, y) &&
    !(x === game.player.x && y === game.player.y) &&
    dist({ x, y }, game.player) <= 4 &&
    game.revealed && game.revealed[y] && !game.revealed[y][x] &&
    !(game.flashlitCells && game.flashlitCells.has(key)) &&
    !isExit(x, y) &&
    !game.pits.has(key) &&
    !(game.wells && game.wells.has(key)) &&
    !(game.cursedWells && game.cursedWells.has(key)) &&
    !(game.crackedFloors && game.crackedFloors.has(key)) &&
    !(game.quicksands && game.quicksands.has(key)) &&
    !(game.cursedGrounds && game.cursedGrounds.has(key)) &&
    !(game.scarabNests && game.scarabNests[key]) &&
    !(game.trapdoors && game.trapdoors.has(key)) &&
    !(game.jackalLairs && game.jackalLairs.has(key)) &&
    !game.relics[key] &&
    !game.treasures[key] &&
    !(game.purifies && game.purifies[key]) &&
    !monsterAt(x, y) &&
    !(game.placedBomb && game.placedBomb.x === x && game.placedBomb.y === y);
}

function getNearbyFogAssistCells(extraCheck = null) {
  const cells = [];
  for (let y = game.player.y - 4; y <= game.player.y + 4; y++) {
    for (let x = game.player.x - 4; x <= game.player.x + 4; x++) {
      if (!canSpawnAssistAt(x, y)) continue;
      if (extraCheck && !extraCheck(x, y)) continue;
      cells.push({ x, y });
    }
  }
  return cells;
}

function maybeSpawnCurseAid() {
  const threshold = game.adventures <= 5 ? CURSE_MAX * 0.5 : CURSE_MAX * 0.7;
  if (game.curse <= threshold) return;
  const purifySpots = getNearbyFogAssistCells();
  if (purifySpots.length) {
    const p = pick(purifySpots);
    game.purifies[keyOf(p.x, p.y)] = pickWeighted(PURIFY_TYPES);
    log('古墓深处有一缕绿光回应了你的诅咒。附近迷雾中出现了净化道具。', 'gold');
  }
  if (!hasRevealedWell() && Math.random() < 0.5) {
    const wellSpots = getNearbyFogAssistCells((x, y) => !hasWellInFifteenBlock(x, y));
    if (wellSpots.length) {
      const w = pick(wellSpots);
      game.wells.add(keyOf(w.x, w.y));
      log('干裂石缝中传来水声。附近迷雾中出现了一口水井。', 'gold');
    }
  }
}

function countWalls(x, y) {
  const w = game.walls[y][x];
  return Number(w.N) + Number(w.E) + Number(w.S) + Number(w.W);
}

function hasWallBetween(x, y, dx, dy) {
  const dir = DIR_INFO.find(d => d.dx === dx && d.dy === dy);
  return !!(dir && game.walls[y] && game.walls[y][x] && game.walls[y][x][dir.key]);
}

function buildMonsters() {
  const targetCount = game.adventures === 1 ? 3 : Math.min(28, Math.round(game.mapSize / 4));
  let attempts = 0;
  while (game.monsters.length < targetCount && attempts < 500) {
    attempts++;
    const ghostCount = game.monsters.filter(m => m.type === 'ghost').length;
    const type = game.adventures === 1 ? 'bat' : randomMonsterType(ghostCount);
    const x = rng(0, game.mapSize - 1);
    const y = rng(0, game.mapSize - 1);
    if (!canPlaceMonster(x, y)) continue;
    game.monsters.push(createMonster(type, x, y));
  }
}

function buildSpecialMonsters() {
  const giant = game.adventures >= 7 && Math.random() < 0.05;
  if (giant) {
    game.monsters = game.monsters.slice(0, Math.ceil(game.monsters.length / 2));
    const p = findSpecialMonsterSpot({ center: true }) || { x: Math.floor(game.mapSize / 2), y: Math.floor(game.mapSize / 2) };
    game.monsters.push(createMonster('giant_scarab', p.x, p.y));
    log('地面开始震颤——一只山一般大的圣甲虫从沙中升起。', 'danger');
  }
  const scale = giant ? 0.5 : 1;
  if (game.adventures >= 4) spawnSpecialType('scorpion', Math.ceil(Math.min(6, 1 + Math.floor((game.adventures - 4) / 2)) * scale));
  if (game.adventures >= 5 && getPriestTargets().length) spawnSpecialType('priest', Math.ceil(Math.min(5, 1 + Math.floor((game.adventures - 5) / 2)) * scale), true);
  if (game.adventures >= 6) spawnSpecialType('gargoyle', Math.ceil(Math.min(4, 1 + Math.floor((game.adventures - 6) / 3)) * scale), true);
  if (game.adventures >= 6 && !giant) spawnJackalsFromLairs();
}

function findSpecialMonsterSpot(opts = {}) {
  let candidates = [];
  if (opts.nearRelic) candidates = getRelicNearbyCells(5);
  if (opts.nearCursed) {
    getPriestTargets().forEach(t => {
      for (let y = t.y - 5; y <= t.y + 5; y++) {
        for (let x = t.x - 5; x <= t.x + 5; x++) if (inBounds(x, y)) candidates.push({ x, y });
      }
    });
  }
  if (opts.center) {
    const c = Math.floor(game.mapSize / 2);
    for (let y = c - 5; y <= c + 5; y++) for (let x = c - 5; x <= c + 5; x++) if (inBounds(x, y)) candidates.push({ x, y });
  }
  candidates = candidates.sort(() => Math.random() - 0.5);
  for (const p of candidates) if (canPlaceMonster(p.x, p.y)) return p;
  for (let i = 0; i < 150; i++) {
    const x = rng(0, game.mapSize - 1), y = rng(0, game.mapSize - 1);
    if (canPlaceMonster(x, y)) return { x, y };
  }
  return null;
}

function spawnSpecialType(type, count, prefer = false) {
  for (let i = 0; i < count; i++) {
    const p = findSpecialMonsterSpot({
      nearRelic: prefer && (type === 'gargoyle'),
      nearCursed: prefer && (type === 'priest')
    });
    if (!p) continue;
    game.monsters.push(createMonster(type, p.x, p.y, type === 'gargoyle' ? { petrified: true } : {}));
  }
}

function spawnJackalsFromLairs() {
  let pair = 1;
  for (const lk of game.jackalLairs || []) {
    const [lx, ly] = lk.split(',').map(Number);
    const spots = [];
    for (let y = ly - 1; y <= ly + 1; y++) for (let x = lx - 1; x <= lx + 1; x++) if (canPlaceMonster(x, y)) spots.push({ x, y });
    const a = spots.shift(), b = spots.shift();
    if (a) game.monsters.push(createMonster('jackal', a.x, a.y, { pairId: pair }));
    if (b) game.monsters.push(createMonster('jackal', b.x, b.y, { pairId: pair }));
    pair++;
  }
}

function updateCurseEyeMarks() {
  game.curseEyeMarks = new Set();
  if (!game.curseEyeLevel || !game.monsters) return;
  if (game.curseEyeLevel >= 3) return;
  const count = game.curseEyeLevel === 1 ? 3 : 5;
  const shuffled = [...game.monsters].sort(() => Math.random() - 0.5);
  shuffled.slice(0, count).forEach(m => game.curseEyeMarks.add(m.id));
}

function canCurseEyeSeeMonster(m) {
  if (!m || !game.curseEyeLevel) return false;
  if (game.curseEyeLevel >= 3) return true;
  return game.curseEyeMarks && game.curseEyeMarks.has(m.id);
}

function updatePurifyEyeMarks() {
  game.purifyEyeMarks = new Set();
  if (!game.purifyEyeLevel || !game.purifies) return;
  if (game.purifyEyeLevel >= 3) return;
  const count = game.purifyEyeLevel === 1 ? 3 : 5;
  const keys = Object.keys(game.purifies).sort(() => Math.random() - 0.5);
  keys.slice(0, count).forEach(k => game.purifyEyeMarks.add(k));
}

function canPurifyEyeSee(x, y) {
  if (!game.purifyEyeLevel || !game.purifies) return false;
  const key = keyOf(x, y);
  if (!game.purifies[key]) return false;
  if (game.purifyEyeLevel >= 3) return true;
  return game.purifyEyeMarks && game.purifyEyeMarks.has(key);
}

function randomMonsterType(ghostCount = 0) {
  const roll = Math.random();
  if (game.adventures === 2) return roll < 0.55 ? 'bat' : 'mummy';
  if (!hasAnyWeapon()) return roll < 0.5 ? 'bat' : 'mummy';
  if (!hasEverHadHolyLight() && ghostCount >= 1) return roll < 0.5 ? 'bat' : 'mummy';
  if (roll < 0.34) return 'bat';
  if (roll < 0.72) return 'mummy';
  return 'ghost';
}

function canPlaceMonster(x, y) {
  const key = `${x},${y}`;
  if (x === game.start.x && y === game.start.y) return false;
  if (isExit(x, y)) return false;
  if (Math.abs(x - game.start.x) <= 2 && Math.abs(y - game.start.y) <= 2) return false;
  if (game.pits.has(key)) return false;
  if (game.relics[key]) return false;
  if (game.wells && game.wells.has(key)) return false;
  if (game.cursedWells && game.cursedWells.has(key)) return false;
  if (game.crackedFloors && game.crackedFloors.has(key)) return false;
  if (game.quicksands && game.quicksands.has(key)) return false;
  if (game.cursedGrounds && game.cursedGrounds.has(key)) return false;
  if (game.scarabNests && game.scarabNests[key]) return false;
  if (game.trapdoors && game.trapdoors.has(key)) return false;
  if (game.jackalLairs && game.jackalLairs.has(key)) return false;
  if (monsterAt(x, y)) return false;
  return true;
}

function monsterAt(x, y) {
  return game.monsters && game.monsters.find(m => m.x === x && m.y === y);
}

function getMonsterSprite(type) {
  const map = {
    bat: 'monster_bat.png',
    mummy: 'monster_mummy.png',
    ghost: 'monster_ghost.png',
    scarab: 'monster_scarab.png',
    priest: 'monster_priest.png',
    scorpion: 'monster_scorpion.png',
    gargoyle: 'monster_gargoyle.png',
    jackal: 'monster_jackal.png',
    giant_scarab: 'monster_giant_scarab.png',
  };
  return map[type] ? `assets/sprites/${map[type]}` : '';
}

function isMediumMonster(type) {
  return ['scorpion', 'gargoyle', 'jackal', 'giant_scarab'].includes(type);
}

function getTreasureChance() {
  if (game.adventures === 1) return 0.26;
  return Math.min(0.82, 0.42 + game.adventures * 0.055);
}

function makeTreasure(x, y) {
  const nearby = game.monsters.filter(m => Math.max(Math.abs(m.x - x), Math.abs(m.y - y)) <= 2).length;
  const levelBonus = Math.min(0.45, (game.adventures - 1) * 0.07);
  const edgeBonus = game.adventures === 2 && (x <= 1 || y <= 1 || x >= game.mapSize - 2 || y >= game.mapSize - 2) ? 0.22 : 0;
  const threatBonus = nearby * 0.16;
  const roll = Math.random();
  if (roll < 0.05 + edgeBonus * 0.8 + levelBonus * 0.8 + threatBonus * 0.55) return { value: 100, type: 'diamond', name: '钻石' };
  if (roll < 0.22 + edgeBonus + levelBonus + threatBonus) return { value: 50, type: 'bag', name: '钱袋' };
  return { value: 10, type: 'coin', name: '普通金币' };
}

function revealAround(cx, cy, r) {
  for (let y = cy - r; y <= cy + r; y++) {
    for (let x = cx - r; x <= cx + r; x++) {
      if (inBounds(x, y)) game.revealed[y][x] = true;
    }
  }
}

function revealInitialArea() {
  if (game.adventures === 1) {
    for (let y = 0; y < game.mapSize; y++) {
      for (let x = 0; x < game.mapSize; x++) {
        game.revealed[y][x] = true;
      }
    }
    return;
  }
  revealAround(game.player.x, game.player.y, game.adventures === 2 ? Math.max(2, getVisionRadius()) : getVisionRadius());
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let y = 0; y < VIEW_SIZE; y++) {
    for (let x = 0; x < VIEW_SIZE; x++) {
      const c = document.createElement('div');
      c.className = 'cell';
      c.textContent = '';
      c.removeAttribute('data-relic-icon');
      c.dataset.x = x;
      c.dataset.y = y;
      c.addEventListener('click', () => {
        const o = getViewOrigin();
        onCellClick(o.x + x, o.y + y);
      });
      c.addEventListener('mouseenter', () => {
        const o = getViewOrigin();
        updateAimPreview(o.x + x, o.y + y);
      });
      board.appendChild(c);
    }
  }
}

function getViewOrigin() {
  const max = game.mapSize - VIEW_SIZE;
  return {
    x: Math.max(0, Math.min(max, game.player.x - Math.floor(VIEW_SIZE / 2))),
    y: Math.max(0, Math.min(max, game.player.y - Math.floor(VIEW_SIZE / 2))),
  };
}

function getEmergencyEscapeGuide() {
  if (game.curse <= CURSE_MAX * 0.8 || !game.exits || !game.revealed) return null;
  const exits = [...game.exits].map(k => {
    const [x, y] = k.split(',').map(Number);
    return { x, y, key: k, d: dist({ x, y }, game.player) };
  }).filter(e => game.revealed[e.y] && game.revealed[e.y][e.x]);
  if (!exits.length) return null;
  exits.sort((a, b) => a.d - b.d);
  const target = exits[0];
  const dx = target.x - game.player.x;
  const dy = target.y - game.player.y;
  let arrow = '◆';
  if (Math.abs(dx) >= Math.abs(dy) && dx !== 0) arrow = dx > 0 ? '→' : '←';
  else if (dy !== 0) arrow = dy > 0 ? '↓' : '↑';
  return { target, arrow };
}

function render() {
  const board = document.getElementById('board');
  const boardContainer = document.getElementById('board-container');
  boardContainer.classList.toggle('curse-warning', game.curse > 50 && game.curse <= 90);
  boardContainer.classList.toggle('curse-critical', game.curse > 90);
  boardContainer.classList.toggle('low-hp', game.hp === 1);
  board.classList.toggle('low-hp', game.hp === 1);
  const cells = board.children;
  const origin = getViewOrigin();
  const escapeGuide = getEmergencyEscapeGuide();
  for (let sy = 0; sy < VIEW_SIZE; sy++) {
    for (let sx = 0; sx < VIEW_SIZE; sx++) {
      const x = origin.x + sx;
      const y = origin.y + sy;
      const c = cells[sy * VIEW_SIZE + sx];
      c.className = 'cell';
      c.style.removeProperty('--entity-img');
      c.removeAttribute('data-escape-arrow');
      c.querySelectorAll('.state-marker,.cell-effect').forEach(el => el.remove());
      if (game.aim) {
        const k = keyOf(x, y);
        if (game.aim.previewKeys && game.aim.previewKeys.has(k)) c.classList.add('target-line');
        if (game.aim.impactKeys && game.aim.impactKeys.has(k)) c.classList.add('target-impact');
        if (game.aim.invalidKey === k) c.classList.add('target-invalid');
      }
      if (game.teleportSelect) {
        const k = keyOf(x, y);
        if (game.teleportSelect.validKeys && game.teleportSelect.validKeys.has(k)) c.classList.add('target-line');
        if (game.teleportSelect.invalidKey === k) c.classList.add('target-invalid');
      }
      if (!inBounds(x, y)) {
        c.classList.add('fog');
        continue;
      }
      const revealed = game.revealed[y][x];
      const flashlit = game.flashlitCells.has(`${x},${y}`);
      if (!revealed && !flashlit) {
        const hiddenMonster = monsterAt(x, y);
        if (hiddenMonster && canCurseEyeSeeMonster(hiddenMonster)) c.classList.add('monster-hint');
        if (canPurifyEyeSee(x, y)) c.classList.add('purify-hint');
        if (game.memoryRelicHints && game.memoryRelicHints.has(keyOf(x, y))) c.classList.add('memory-hint');
        c.classList.add('fog');
        continue;
      }
      c.classList.add('revealed');
      if (flashlit) c.classList.add('flashlit');
      if (game.walls[y][x].N) c.classList.add('wall-n');
      if (game.walls[y][x].E) c.classList.add('wall-e');
      if (game.walls[y][x].S) c.classList.add('wall-s');
      if (game.walls[y][x].W) c.classList.add('wall-w');
      if (game.walls[y][x].N || game.walls[y][x].E || game.walls[y][x].S || game.walls[y][x].W) unlockNotebook('terrains', 'wall');
      if (game.exits && game.exits.has(keyOf(x, y))) {
        c.classList.add('start');
        unlockNotebook('terrains', 'exit');
      }
      if (escapeGuide && escapeGuide.target.x === x && escapeGuide.target.y === y) c.classList.add('escape-target');
      // entities (only show monsters in revealed area)
      if (game.attackCell === `${x},${y}`) c.classList.add('attacked');
      if (game.player.x === x && game.player.y === y) {
        c.classList.add('player');
        if (escapeGuide) {
          c.classList.add('escape-arrow');
          c.setAttribute('data-escape-arrow', escapeGuide.arrow);
        }
      }
      else if (monsterAt(x, y)) {
        const m = monsterAt(x, y);
        unlockNotebook('monsters', m.type);
        c.classList.add('monster', MONSTER_TYPES[m.type].className);
        c.classList.add('has-entity-img');
        if (isMediumMonster(m.type)) c.classList.add('entity-medium');
        c.style.setProperty('--entity-img', `url("${getMonsterSprite(m.type)}")`);
        if (m.petrified) c.classList.add('petrified');
        if (m.enragedTurns > 0) c.classList.add('enraged');
        if (m.startled) {
          c.classList.add('waking');
          appendStateMarker(c, 'wake');
        }
        else if (game.turn < AWAKEN_TURN - 1) {
          c.classList.add('sleeping');
          appendStateMarker(c, 'sleep');
        }
        else if (game.turn === AWAKEN_TURN - 1) {
          c.classList.add('waking');
          appendStateMarker(c, 'wake');
        }
      }
      if (game.cursedWells && game.cursedWells.has(`${x},${y}`)) { c.classList.add('cursed-well'); unlockNotebook('terrains', 'cursed_well'); }
      else if (game.scarabNests && game.scarabNests[`${x},${y}`] && !game.scarabNests[`${x},${y}`].exhausted) { c.classList.add('scarab-nest'); unlockNotebook('terrains', 'scarab_nest'); }
      else if (game.trapdoors && game.trapdoors.has(`${x},${y}`)) { c.classList.add('trapdoor'); unlockNotebook('terrains', 'trapdoor'); }
      else if (game.jackalLairs && game.jackalLairs.has(`${x},${y}`)) { c.classList.add('jackal-lair'); unlockNotebook('terrains', 'jackal_lair'); }
      else if (game.cursedGrounds && game.cursedGrounds.has(`${x},${y}`)) { c.classList.add('cursed-ground'); unlockNotebook('terrains', 'cursed_ground'); }
      else if (game.quicksands && game.quicksands.has(`${x},${y}`)) { c.classList.add('quicksand'); unlockNotebook('terrains', 'quicksand'); }
      else if (game.pits.has(`${x},${y}`)) { c.classList.add('pit'); unlockNotebook('terrains', 'pit'); }
      else if (game.crackedFloors && game.crackedFloors.has(`${x},${y}`)) { c.classList.add('cracked'); unlockNotebook('terrains', 'cracked'); }
      else if (game.relics[`${x},${y}`]) {
        const relic = RELIC_MAP[game.relics[`${x},${y}`]];
        unlockNotebook('relics', game.relics[`${x},${y}`]);
        c.classList.add('relic');
        c.setAttribute('data-relic-icon', relic ? relic.icon : '📜');
      }
      else if (game.wells && game.wells.has(`${x},${y}`)) { c.classList.add('well'); unlockNotebook('terrains', 'well'); }
      else if (game.placedBomb && game.placedBomb.x === x && game.placedBomb.y === y) c.classList.add('bomb');
      else if (game.purifies && game.purifies[`${x},${y}`]) {
        const p = game.purifies[`${x},${y}`];
        c.classList.add('purify', PURIFY_TYPES[p].cssClass);
      }
      else if (game.treasures[`${x},${y}`]) {
        c.classList.add('treasure', game.treasures[`${x},${y}`].type);
      }
      appendCellEffects(c, x, y);
    }
  }
  document.getElementById('turn').textContent = game.turn;
  document.getElementById('adventure').textContent = game.adventures;
  const hpEl = document.getElementById('hp');
  hpEl.textContent = '♥'.repeat(Math.max(0, game.hp)) + '♡'.repeat(Math.max(0, getMaxHp() - game.hp));
  hpEl.classList.toggle('hp-low', game.hp === 1);
  document.getElementById('gold').textContent = game.gold;
  document.getElementById('relics').textContent = `📜 ${game.relicsCollected} / ${TOTAL_RELICS}`;
  const curseEl = document.getElementById('curse-text');
  if (curseEl) {
    curseEl.textContent = `${game.curse} / ${CURSE_MAX}`;
    const ratio = game.curse / CURSE_MAX;
    curseEl.style.color = ratio < 0.4 ? '#ff7ad9' : ratio < 0.75 ? '#ff5577' : '#ff2a2a';
    curseEl.classList.toggle('curse-warning', game.curse > 50 && game.curse <= 90);
    curseEl.classList.toggle('curse-critical', game.curse > 90);
  }
  const bar = document.getElementById('curse-bar');
  if (bar) {
    bar.style.width = Math.min(100, (game.curse / CURSE_MAX) * 100) + '%';
    bar.classList.toggle('curse-warning', game.curse > 50 && game.curse <= 90);
    bar.classList.toggle('curse-critical', game.curse > 90);
    if (bar.parentElement) {
      bar.parentElement.classList.toggle('curse-warning', game.curse > 50 && game.curse <= 90);
      bar.parentElement.classList.toggle('curse-critical', game.curse > 90);
    }
  }
  document.getElementById('phase').textContent = game.turn < AWAKEN_TURN ? '沉睡期' : '苏醒期';
  document.getElementById('phase').style.color = game.turn < AWAKEN_TURN ? '#a08660' : '#d44';
  renderItemGrid();
  updateBgmState();
}

function appendStateMarker(cell, type) {
  const marker = document.createElement('div');
  marker.className = `state-marker ${type}`;
  marker.textContent = type === 'sleep' ? 'Zzz' : '!';
  cell.appendChild(marker);
}

function appendCellEffects(cell, x, y) {
  if (!Array.isArray(game.cellEffects)) return;
  const key = keyOf(x, y);
  game.cellEffects.filter(e => e.key === key).forEach(e => {
    const el = document.createElement('div');
    el.className = `cell-effect ${e.type}`;
    el.textContent = e.text || '';
    cell.appendChild(el);
  });
}

function addCellEffect(x, y, type = 'hit', text = '', duration = 650) {
  if (!inBounds(x, y)) return;
  if (!Array.isArray(game.cellEffects)) game.cellEffects = [];
  const id = `${Date.now()}-${Math.random()}`;
  game.cellEffects.push({ id, key: keyOf(x, y), type, text });
  setTimeout(() => {
    if (!Array.isArray(game.cellEffects)) return;
    game.cellEffects = game.cellEffects.filter(e => e.id !== id);
    render();
  }, duration);
}

function onCellClick(x, y) {
  ensureAudioStarted();
  if (game.over || game.shopOpen || game.modalOpen) return;
  if (game.teleportSelect) {
    confirmScrollTeleport(x, y);
    return;
  }
  if (game.aim) {
    updateAimPreview(x, y);
    confirmAim();
    return;
  }
  const dx = x - game.player.x;
  const dy = y - game.player.y;
  if (Math.abs(dx) + Math.abs(dy) !== 1) {
    log('只能点击上下左右相邻一格移动。');
    return;
  }
  tryMove(dx, dy);
}

function tryMove(dx, dy) {
  if (game.over || game.shopOpen || game.modalOpen) return;
  const oldKey = keyOf(game.player.x, game.player.y);
  const nx = game.player.x + dx, ny = game.player.y + dy;
  const newKey = keyOf(nx, ny);
  if (!inBounds(nx, ny)) return;
  if (hasWallBetween(game.player.x, game.player.y, dx, dy)) {
    log('墙壁挡住了这个方向。', 'danger');
    render();
    return;
  }
  if (game.pits.has(`${nx},${ny}`)) {
    log('前方是坑位，无法直接移动上去。', 'danger');
    render();
    return;
  }
  if (game.wells && game.wells.has(`${nx},${ny}`)) {
    log('水井挡住了去路。', 'danger');
    render();
    return;
  }
  if (game.cursedWells && game.cursedWells.has(`${nx},${ny}`)) {
    log('诅咒水井挡住了去路，井口涌出黑紫色雾气。', 'danger');
    render();
    return;
  }
  const standingMonster = monsterAt(nx, ny);
  if (standingMonster) {
    if (!game.hasDagger) {
      log('我没有武器，无法接近。', 'danger');
      return;
    }
    playerAttack(standingMonster);
    return;
  }
  game.player.x = nx;
  game.player.y = ny;
  revealAround(nx, ny, getVisionRadius());
  if (game.pendingCrackCollapse && game.pendingCrackCollapse === oldKey) {
    game.crackedFloors.delete(oldKey);
    game.pits.add(oldKey);
    game.pendingCrackCollapse = '';
    playSfx('crack');
    log('身后的破碎地面崩塌成了坑。', 'danger');
  }
  if (game.crackedFloors && game.crackedFloors.has(newKey)) {
    game.pendingCrackCollapse = newKey;
    log('脚下的破碎地面发出断裂声，离开后它会塌陷。', 'danger');
  }
  if (game.cursedGrounds && game.cursedGrounds.has(newKey)) {
    increaseCurse(5);
    playSfx('hazard');
    log('你踏入诅咒之地，诅咒值 +5。', 'danger');
  }
  if (game.quicksands && game.quicksands.has(newKey)) {
    game.hp--;
    playSfx('hazard');
    log('你踩入流沙陷阱，砂砾撕扯着双腿，生命 -1。', 'danger');
  }
  triggerScarabNest(nx, ny);
  if (triggerTrapdoor(nx, ny, false)) return;
  const curseGain = getMoveCurseGain();
  if (curseGain > 0) increaseCurse(curseGain);
  if (hasRelic('sandstorm_ring') && Math.random() < 0.1) {
    game.hp--;
    log('沙暴之环引发流沙陷阱，你原地损失1点生命。', 'danger');
  }
  collectTileAt(nx, ny);
  endTurn();
  promptEscapeAtStart();
}

window.bossMove = function(dx, dy) {
  const b = game.boss;
  const nx = Math.max(0, Math.min(8, b.player.x + dx));
  const ny = Math.max(0, Math.min(8, b.player.y + dy));
  if (b.guards.some(g => g.x === nx && g.y === ny)) {
    const g = b.guards.find(g => g.x === nx && g.y === ny);
    g.hp--;
    b.log.push('你击倒了一名木乃伊守卫，获得一次额外攻击机会。');
    if (g.hp <= 0) { b.guards = b.guards.filter(x => x !== g); b.extraHits++; }
  } else {
    b.player = { x: nx, y: ny };
  }
  bossEndTurn();
};

window.bossAttack = function() {
  const b = game.boss;
  if (dist(b.player, b.pharaoh) === 1 || b.extraHits > 0) {
    const dmg = b.extraHits > 0 ? 1 : (hasRelic('bronze_scepter') ? 2 : 1);
    if (b.extraHits > 0) b.extraHits--;
    b.hp -= dmg;
    b.log.push('你的攻击击中了法老的胸膛，一道裂缝出现在他的石质皮肤上。');
    if (bossCheckWin()) return;
    bossEndTurn();
  } else {
    b.log.push('你距离法老太远，无法攻击。');
    renderPharaohBattle();
  }
};

window.bossHoly = function() {
  const b = game.boss;
  if (game.holyLights <= 0) { b.log.push('你没有圣光术。'); renderPharaohBattle(); return; }
  if (Math.max(Math.abs(b.player.x - b.pharaoh.x), Math.abs(b.player.y - b.pharaoh.y)) > 1) {
    b.log.push('圣光术必须在法老周围3×3范围内释放。');
    renderPharaohBattle();
    return;
  }
  game.holyLights--;
  b.hp -= 3;
  b.log.push('圣光击穿法老的王冠，金色裂缝爬满他的胸膛。');
  if (bossCheckWin()) return;
  bossEndTurn();
};

function bossEndTurn() {
  const b = game.boss;
  b.turn++;
  if (b.turn % 2 === 0) {
    b.log.push('法老释放诅咒波，席卷你所在的行与列。');
    if (b.player.x === b.pharaoh.x || b.player.y === b.pharaoh.y) { game.hp--; increaseCurse(10); }
  }
  if (b.turn % 3 === 0) {
    b.log.push('法老召唤2只精英木乃伊守卫。');
    for (let i = 0; i < 2; i++) {
      let gx = rng(1, 7), gy = rng(1, 7), guardAttempts = 0;
      while ((gx === b.player.x && gy === b.player.y || gx === b.pharaoh.x && gy === b.pharaoh.y || b.guards.some(g => g.x === gx && g.y === gy)) && guardAttempts++ < 20) {
        gx = rng(1, 7); gy = rng(1, 7);
      }
      b.guards.push({ x: gx, y: gy, hp: 2 });
    }
  }
  if (b.turn % 4 === 0) {
    const sheltered = (b.player.x === 0 || b.player.x === 8) && (b.player.y === 0 || b.player.y === 8);
    b.log.push('法老的十三只眼睛锁定了你。');
    if (!sheltered) { game.hp -= 2; increaseCurse(15); }
  }
  b.guards.forEach(g => {
    if (dist(g, b.player) === 1) game.hp--;
    else if (Math.abs(b.player.x - g.x) > Math.abs(b.player.y - g.y)) g.x += Math.sign(b.player.x - g.x);
    else g.y += Math.sign(b.player.y - g.y);
  });
  if (game.hp <= 0 || game.curse >= CURSE_MAX) { bossLose(); return; }
  renderPharaohBattle();
}

function bossCheckWin() {
  if (game.boss.hp > 0) {
    if (game.boss.hp <= 3) game.boss.log.push('法老的王座开始碎裂，他的声音变得支离破碎。');
    return false;
  }
  game.gold += 10000;
  game.adventureGold += 10000;
  showGoldGain(10000);
  game.pharaohConquered = true;
  game.collectedRelics = [];
  game.relicsCollected = 0;
  game.modalOpen = true;

}

function endTurn() {
  game.turn++;
  if (game.poisonTurns > 0) {
    game.poisonTurns--;
    increaseCurse(2);
    log('毒素在血液中扩散：诅咒值 +2。', 'danger');
  }
  game.monsters.forEach(m => {
    if (m.enragedTurns > 0) m.enragedTurns--;
  });
  if (game.turn % 5 === 0) {
    spawnWellWater();
    spreadCursedWells();
  }
  // bomb detonation
  if (game.placedBomb) detonateBomb();
  // monster phase
  if (game.turn >= AWAKEN_TURN) {
    if (game.turn === AWAKEN_TURN) log('！沉睡的怪物苏醒了！', 'danger');
    moveMonsters();
    if (game.over) return;
  }
  // win/lose checks
  checkLose();
  if (game.over) return;
  maybeSpawnCurseAid();
  // curse fully consumed -> death
  if (game.curse >= CURSE_MAX) {
    if (isExit(game.player.x, game.player.y) && game.turn > 2) {
      render();
      return;
    }
    gameOver('诅咒彻底吞噬了你，你的心脏停止了跳动……如果不是这么贪婪，事情会不会有所不同？');
    return;
  }
  render();
}

  setTimeout(() => {
    if (game.over || game.shopOpen || game.modalOpen) return;
    if (!isExit(game.player.x, game.player.y)) return;
    showEscapePrompt();
  }, 80);
}
